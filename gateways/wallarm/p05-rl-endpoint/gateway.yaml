# gateways/wallarm/p05-rl-endpoint/gateway.yaml
#
# Profile p05-rl-endpoint: per-endpoint static rate limit, 100 req/s,
# rolling 1-second window, scoped to `/anything/limited` via route-level
# `POST /flow`. The policy itself is bootstrapped through the Admin API
# in setup.sh — this file only carries the baseline uniform settings
# from docs/GATEWAYS.md (identical to every other wallarm profile).
#
#   - HTTP/1.1 only (wallarm listener is HTTP/1.1 by default)
#   - upstream pool: 1024 idle connections, 60 s idle timeout
#   - TCP keepalive: 90 s, nodelay on
#   - no persistence (we tear down after every run)

net:
  http_port: 9080

admin:
  listen_address: "0.0.0.0"
  listen_port: 9081

persistence:
  enabled: false

upstream:
  pool:
    size: 1024
    idle_timeout_ms: 60000
  tcp:
    keepalive_secs: 90
    nodelay: true
    reuse_address: true
