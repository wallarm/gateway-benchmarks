# gateways/envoy/p01-vanilla/envoy.yaml
#
# Profile: p01-vanilla (catch-all proxy, no policy).
# Expected fixture behaviour (fixtures/p01-vanilla.jsonl):
#   GET  /status/200  → 200                            (status passthrough)
#   GET  /anything    → 200 + body echoes .method      (json echo)
#   POST /anything    → 200 + body echoes .json        (json echo)
#   GET  /bytes/1024  → 200 + Content-Length present   (binary passthrough)
#
# Everything is expressed inline as a static bootstrap so there is no
# xDS dance, no control plane, and no hidden state. Every uniform
# setting from docs/GATEWAYS.md §Uniform settings is spelled out so
# envoy's defaults don't quietly drift the measurement.

# -----------------------------------------------------------------------------
# Admin API — read-only, bound on all interfaces so the compose port
# mapping can expose it on :9901. No policy profile mutates envoy
# through the admin API; it exists purely for debugging (/stats,
# /clusters, /config_dump).
# -----------------------------------------------------------------------------
admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  # ---------------------------------------------------------------------------
  # Listener — HTTP/1.1 only (codec_type: HTTP1), downstream :9080.
  # ---------------------------------------------------------------------------
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9080
      # SO_REUSEPORT lets every worker thread own its accept() socket
      # and avoids the thundering herd. Matches the nginx `reuseport`
      # directive so the two columns start from the same socket model.
      reuse_port: true
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                # HTTP/1.1 on the downstream side — the parity fixtures
                # are explicitly HTTP/1.1 so the measurement has a fixed
                # wire format. No `http2_protocol_options` is set.
                codec_type: HTTP1
                # Access logging OFF on the hot path (no `access_log`
                # list) — log I/O would bias latency. envoy's admin
                # /stats endpoint still exposes per-cluster counters
                # that the attestation ignores but operators can read.
                # Downstream keep-alive ON. envoy's HCM uses the
                # common_http_protocol_options knobs for idle timing.
                common_http_protocol_options:
                  idle_timeout: 60s
                  # NOTE: we deliberately do NOT set max_connection_duration.
                  # In envoy proto semantics an UNSET field means "no maximum",
                  # but setting it to `0s` means "close the connection at t=0"
                  # (envoy's `downstream_cx_max_duration_reached` counter flips
                  # on every connection and the client sees `curl: (52) Empty
                  # reply from server` / truncated responses). The default
                  # (unset) is what we want: keep long-lived keep-alive
                  # connections open until the idle timeout fires.
                  max_requests_per_connection: 100000
                # Request timeouts — 10 s uniform. envoy splits these
                # into per-stream / per-connection budgets; the
                # per-route timeout below is the primary knob.
                stream_idle_timeout: 60s
                request_timeout: 10s
                # Skip normalization (`true` would collapse `//` etc.).
                # The fixture paths never need it and a literal
                # passthrough is safest for parity with other gateways.
                normalize_path: false
                merge_slashes: false
                # Do not generate a `server: envoy` header variation;
                # we want the uniform default for p01 and a fine-grained
                # override in p08. `PASS_THROUGH` would leak upstream
                # headers, `APPEND_IF_ABSENT` matches nginx's default
                # behaviour.
                server_header_transformation: OVERWRITE
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_vh
                      domains: ["*"]
                      routes:
                        # Single catch-all route — the cleanest way to
                        # express a vanilla gateway in envoy. No URL
                        # rewriting, no host header manipulation.
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                            # Per-stream timeout — uniform 10 s. The
                            # HCM `request_timeout` above guards the
                            # request header phase; this one guards
                            # the total stream.
                            timeout: 10s
                http_filters:
                  # Router is always the terminal filter. Any future
                  # profile chain (jwt_authn, local_ratelimit, lua,
                  # header_to_add/remove) will be inserted *before*
                  # this entry.
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  # ---------------------------------------------------------------------------
  # Upstream — a single STRICT_DNS cluster pointing at `backend:8080`
  # on the bench-net bridge. STRICT_DNS re-resolves periodically so a
  # backend restart is picked up without an envoy bounce.
  # ---------------------------------------------------------------------------
  clusters:
    - name: backend_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 10s
      # Upstream HTTP/1.1 + keep-alive. envoy reuses idle connections
      # from the per-worker pool automatically; the knobs below just
      # make the posture explicit for reviewers.
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 60s
            max_requests_per_connection: 100000
      # TCP-level keep-alive so dead upstream sockets are detected
      # promptly under sustained bursts.
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
          keepalive_interval: 10
          keepalive_probes: 3
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 8080
