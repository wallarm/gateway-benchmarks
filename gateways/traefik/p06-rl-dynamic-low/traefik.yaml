# gateways/traefik/p06-rl-dynamic-low/traefik.yaml
#
# Profile: p06-rl-dynamic-low (per-IP RL at 10 rps, low fan-out).
# Canonical spec: docs/POLICIES.md § p05 — 10 rps per X-Real-IP,
# rolling 1-second window.
# Fixture: fixtures/p06-rl-dynamic-low.jsonl.
#
# Static config is identical to p01 — per-IP bucketing is a dynamic
# config concern driven by `rateLimit.sourceCriterion.requestHeaderName`.
#
# Traefik splits config into a static half (this file — entryPoints,
# providers, plugins, api, log) and a dynamic half (dynamic.yaml —
# routers, services, middlewares). The static file is read once at
# process start; the dynamic file is watched by the file provider
# and hot-reloaded.
#
# We deliberately keep the static config minimal:
#   * one HTTP entryPoint on :9080 (same port contract as every
#     other gateway under gateways/<gw>/)
#   * file provider pointing at /etc/traefik/dynamic/ (mounted from
#     gateways/traefik/p01-vanilla/dynamic.yaml)
#   * logs at ERROR level so the hot path is quiet
#   * api+dashboard DISABLED (no management surface published)
#
# `experimental.localPlugins` is declared even on profiles that don't
# load a plugin, so the static config is uniform across profiles and
# the only diff across p01..p12 lives in dynamic.yaml. p01 does not
# reference the plugin, so Traefik loads the Yaegi source but never
# instantiates it.

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: ERROR
  format: common

accessLog: {}

api:
  dashboard: false
  insecure: false

entryPoints:
  web:
    address: ":9080"
    forwardedHeaders:
      # p05 keys its per-IP rate-limit bucket on X-Real-IP
      # (see dynamic.yaml → middlewares.bench-p06.rateLimit.
      # sourceCriterion.requestHeaderName). Traefik treats
      # X-Real-IP as a forwarded header and strips it by default
      # when the peer is untrusted, which would collapse every
      # request into a single empty-string bucket. Flipping
      # `insecure: true` trusts the client-supplied value
      # verbatim — acceptable because loadgen runs against
      # localhost and the fixture itself owns what X-Real-IP
      # should be.
      insecure: true

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

experimental:
  localPlugins:
    body_rewrite:
      modulename: github.com/wallarm/body_rewrite
