# gateways/apisix/_oidc-server/nginx.conf
#
# Tiny static server used only by the apisix stack. It exposes two
# endpoints on port 80 inside `bench-net`:
#
#     http://oidc-server/.well-known/openid-configuration
#         — a hand-crafted, minimal OpenID Connect discovery document
#           (see `openid-configuration.json` in this directory)
#
#     http://oidc-server/.well-known/jwks.json
#         — the canonical JWKS served byte-for-byte from
#           `gateways/_reference/jwks-rs256/jwks.json`
#
# Why both? APISIX's `openid-connect` plugin is the only built-in
# primitive that does proper JWKS + `kid` lookup on RS256 tokens
# (the simpler `jwt-auth` plugin takes a single PEM and ignores
# `kid`, which collapses probe 3 of `p03-jwks-rs256-basic` into a
# spurious PASS — see apache/apisix#12791). The plugin reads
# `jwks_uri` out of the OIDC discovery document, not directly from
# a JWKS URL; hence the discovery file. This sidecar serves both
# endpoints because APISIX is the only consumer — no reason to
# publish them on the host or complicate the upstream.
#
# The same nginx:alpine image is shared with:
#   * gateways/nginx/docker-compose.yaml (the core nginx column)
#   * gateways/tyk/_jwks-server/         (tyk's JWKS sidecar)
# so the pull surface stays a single digest.

server {
    listen      80 default_server;
    server_name _;

    # The two well-known files are bind-mounted at their canonical
    # absolute paths (see docker-compose.yaml, service `oidc-server`).
    # Pinning `root` explicitly keeps the scenario reproducible even if
    # the base image changes its default docroot.
    root        /usr/share/nginx/html;

    # OpenID Connect discovery document. Cache-Control short so a
    # future `docker compose restart oidc-server` after an asset
    # rotation takes effect inside APISIX quickly (the plugin's own
    # `jwk_expires_in` defaults to 86 400 s, but the parity harness
    # tears the stack down between profiles so the cache is always
    # cold on the next boot).
    location = /.well-known/openid-configuration {
        default_type      application/json;
        add_header        Cache-Control "public, max-age=60" always;
        add_header        X-OIDC-Source "gateway-benchmarks/apisix/_oidc-server/openid-configuration.json" always;
    }

    # Canonical JWKS. Content-Type is the one lua-resty-openidc
    # expects (`application/jwk-set+json` is accepted too, but plain
    # `application/json` is what every production JWKS endpoint on
    # the public internet actually serves — see OIDC Core 1.0
    # Appendix A which just says "JSON").
    location = /.well-known/jwks.json {
        default_type      application/json;
        add_header        Cache-Control "public, max-age=60" always;
        add_header        X-JWKS-Source "gateway-benchmarks/_reference/jwks-rs256/jwks.json" always;
    }

    # Everything else is a hard 404 — we do NOT want this sidecar to
    # act as a generic static file server. Keep the attack surface to
    # exactly the two well-known paths.
    location / {
        return 404;
    }
}
