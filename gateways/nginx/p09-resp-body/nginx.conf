# gateways/nginx/p09-resp-body/nginx.conf
#
# Profile: p09-resp-body.
# Canonical spec: docs/POLICIES.md § p09 — rewrite the response body
#   * add    $.bench.injected = true
#   * remove $.origin
# Canonical fixture: fixtures/p09-resp-body.jsonl
#
# Implementation: OpenResty with the canonical
# `header_filter_by_lua_block` + `body_filter_by_lua_block` pair —
# the same two-phase pattern documented in
# `lua-nginx-module`'s README, reused across most OpenResty-based
# API gateways (Kong, APISIX, 3scale, ...).
#
#   1. `header_filter_by_lua_block` unsets Content-Length. Chunks
#      now flow as HTTP/1.1 chunked transfer encoding, which is
#      mandatory because we are about to change the body length.
#   2. `body_filter_by_lua_block` accumulates chunks into
#      `ngx.ctx.buf`. On the terminal chunk (`ngx.arg[2]` truthy)
#      we concatenate, hand the buffer to body_rewrite.lua, and
#      emit the transformed JSON as the replacement body.
#      Intermediate chunks are suppressed with `ngx.arg[1] = nil`
#      so the client sees a single, correct payload.
#
# Non-JSON upstream responses (HTML error pages, streamed binary)
# are passed through verbatim — `rewrite_response_if_json` short-
# circuits on anything that doesn't decode. This matches the
# wallarm cell behaviour (gateways/wallarm/p09-resp-body/NOTES.md).

user                 nobody;
worker_processes     auto;
worker_rlimit_nofile 65535;

error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    access_log           off;
    keepalive_timeout    60s;
    keepalive_requests   100000;
    tcp_nodelay          on;
    tcp_nopush           off;
    sendfile             on;

    proxy_buffering           on;
    proxy_request_buffering   off;

    proxy_http_version 1.1;
    proxy_set_header   Connection           "";
    proxy_set_header   Host                 $http_host;
    proxy_set_header   X-Real-IP            $remote_addr;
    proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto    $scheme;

    proxy_connect_timeout   10s;
    proxy_send_timeout      10s;
    proxy_read_timeout      10s;

    upstream backend_pool {
        server backend:8080;
        keepalive         1024;
        keepalive_time    1h;
        keepalive_timeout 60s;
        keepalive_requests 100000;
    }

    default_type  application/octet-stream;

    lua_package_path "/usr/local/openresty/lualib/bench/?.lua;;";

    init_by_lua_block {
        bench_body = require("body_rewrite")
    }

    server {
        listen                 9080 reuseport;
        server_name            bench-nginx;

        location / {
            proxy_pass http://backend_pool;

            header_filter_by_lua_block {
                -- Length will change after rewrite; switch to
                -- chunked transfer encoding by clearing Content-
                -- Length. nginx will then emit `Transfer-Encoding:
                -- chunked` automatically for HTTP/1.1.
                ngx.header.content_length = nil
            }

            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local eof   = ngx.arg[2]

                local buf = ngx.ctx.bench_buf
                if not buf then
                    buf = {}
                    ngx.ctx.bench_buf = buf
                end
                if chunk and chunk ~= "" then
                    buf[#buf + 1] = chunk
                end

                if eof then
                    local raw = table.concat(buf)
                    local new = bench_body.rewrite_response_if_json(
                        raw,
                        { "bench", "injected" }, true,
                        { "origin" }
                    )
                    ngx.arg[1] = new
                    ngx.arg[2] = true
                else
                    -- Swallow intermediate chunks until we see EOF.
                    ngx.arg[1] = nil
                end
            }
        }
    }
}
