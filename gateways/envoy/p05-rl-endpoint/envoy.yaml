# gateways/envoy/p05-rl-endpoint/envoy.yaml
#
# Profile: p05-rl-endpoint (per-endpoint static rate limit).
# Canonical spec:    docs/POLICIES.md § p04
# Canonical fixture: fixtures/p05-rl-endpoint.jsonl
#
# Limit:      100 req/s, rolling 1 s window.
# Scope:      ONE client-visible path (`/anything/limited`).
# Free path:  `/anything/free` must stay unrestricted — same listener,
#             same worker, same upstream. A single 429 on that path
#             fails the fixture's `status_429_max: 0` assertion.
# Over-limit: HTTP 429 + `Retry-After: 1`.
#
# Envoy idiom: install `envoy.filters.http.local_ratelimit` at the HCM
# level with the filter GLOBALLY DISABLED (filter_enabled default
# value = 0 / HUNDRED → filter never fires), then override the config
# at the route level for `/anything/limited` only. Per the v1.32
# LocalRateLimit proto:
#
#   > Per-route configuration can be used to override the filter
#   > configuration at the virtual host or route level. The per-route
#   > configuration *completely replaces* the filter's HCM-level
#   > configuration for that route.
#
# Therefore:
#   * `/anything/limited` route → the 100-rps bucket applies (override).
#   * everything else            → inherits HCM config (disabled).
#
# The HCM-level filter must still be installed in the filter chain for
# route overrides to take effect. We set its `token_bucket` to a
# placeholder (1 token per second); it is never consumed because
# `filter_enabled` is 0% at that level. `filter_enforced: 100%` is
# carried over to the route-level override verbatim (per-route config
# replaces, not merges).
#
# BUCKET SHAPE — 100 rps matched to nginx's leaky bucket
# ------------------------------------------------------
# Route-level token bucket:
#   max_tokens:       100   (burst cap — matches nginx `burst=100 nodelay`)
#   tokens_per_fill:  5
#   fill_interval:    0.05s (50 ms = envoy's smallest interval)
#     → 5 / 0.05s = 100 rps steady refill
#
# Under the fixture's ASAP 1200-request burst against the cold bucket:
#   ~110 × 2xx  (100 initial burst + ~10 refill over the ~100 ms
#                burst window, at 5 tokens every 50 ms)
#   ~1090 × 429
#
# Matches nginx/p04's observed `2xx=107, 429=1093` within a handful
# of requests. Far above the fixture's `status_429_min=150 ± 50`.
#
# WHY NOT max_tokens=100 + tokens_per_fill=100 + fill_interval=1s?
# ----------------------------------------------------------------
# Same reason as p04-rl-static — envoy's `max_tokens` is the total
# capacity (same meaning as nginx's `burst`), not a steady-rate
# ceiling. Coarse fill intervals dump the full refill budget at the
# top of every second, which would inflate the 2xx count during a
# sub-second burst that straddles a refill tick.
#
# Everything outside the filter (listener, cluster, uniform settings)
# is identical to p01-vanilla so the cells stay apples-to-apples on
# every non-RL axis.

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9080
      reuse_port: true
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: HTTP1
                common_http_protocol_options:
                  idle_timeout: 60s
                  # See p01-vanilla/envoy.yaml: leaving
                  # max_connection_duration UNSET (rather than `0s`) is
                  # the "no maximum" setting — `0s` would close every
                  # connection at t=0 and every request would fail
                  # mid-response.
                  max_requests_per_connection: 100000
                stream_idle_timeout: 60s
                request_timeout: 10s
                normalize_path: false
                merge_slashes: false
                server_header_transformation: OVERWRITE
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_vh
                      domains: ["*"]
                      # Route match precedence in envoy: in-list order.
                      # The specific `/anything/limited` prefix MUST
                      # come before the catch-all `/` so the filter
                      # override actually applies.
                      routes:
                        - match:
                            prefix: "/anything/limited"
                          route:
                            cluster: backend_cluster
                            timeout: 10s
                          typed_per_filter_config:
                            envoy.filters.http.local_ratelimit:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                              stat_prefix: http_local_rl_p05_limited
                              token_bucket:
                                # 100 rps steady leak, 100-request burst
                                # cap — matches nginx/p04's
                                # `rate=100r/s, burst=100 nodelay`.
                                max_tokens: 100
                                tokens_per_fill: 5
                                fill_interval: 0.05s
                              filter_enabled:
                                runtime_key: local_rate_limit_enabled
                                default_value:
                                  numerator: 100
                                  denominator: HUNDRED
                              filter_enforced:
                                runtime_key: local_rate_limit_enforced
                                default_value:
                                  numerator: 100
                                  denominator: HUNDRED
                              status:
                                code: TooManyRequests
                              # Stamp `Retry-After: 1` on the rejection
                              # response per POLICIES.md § p04.
                              response_headers_to_add:
                                - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                                  header:
                                    key: retry-after
                                    value: "1"
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 10s
                          # No typed_per_filter_config → inherits the
                          # HCM-level filter, which is globally disabled
                          # (filter_enabled default_value = 0 / HUNDRED
                          # below) → `/anything/free` and every other
                          # path bypasses the bucket entirely.
                http_filters:
                  # Global local_ratelimit config — disabled by
                  # default. Only the `/anything/limited` route
                  # enables it via the `typed_per_filter_config` above.
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: http_local_rl_p05_global
                      # Placeholder token bucket — never consumed
                      # because `filter_enabled` is 0% at the HCM
                      # level. Set to something small to make the
                      # "not-used" intent obvious to reviewers.
                      token_bucket:
                        max_tokens: 1
                        tokens_per_fill: 1
                        fill_interval: 1s
                      # 0% enabled globally → the filter never fires
                      # on a route that does not override this config.
                      filter_enabled:
                        runtime_key: local_rate_limit_enabled
                        default_value:
                          numerator: 0
                          denominator: HUNDRED
                      # 100% enforced — only matters on routes that
                      # override `filter_enabled` to 100%. The
                      # route-level override below carries its own
                      # `filter_enforced: 100%` too (per-route config
                      # is a full replacement, not a merge — see the
                      # file header).
                      filter_enforced:
                        runtime_key: local_rate_limit_enforced
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      status:
                        code: TooManyRequests
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: backend_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 10s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 60s
            max_requests_per_connection: 100000
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
          keepalive_interval: 10
          keepalive_probes: 3
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 8080
