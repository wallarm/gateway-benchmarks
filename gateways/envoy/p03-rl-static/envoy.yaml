# gateways/envoy/p03-rl-static/envoy.yaml
#
# Profile: p03-rl-static (static service-wide rate limit, 1000 rps,
# rolling 1 s window).
# Canonical spec: docs/POLICIES.md § p03
# Canonical fixture: fixtures/p03-rl-static.jsonl
#
# Envoy realises "rate-limit with 429 response" via the
# `envoy.filters.http.local_ratelimit` filter at the HCM (listener)
# level. The token bucket is:
#
#   max_tokens:       200   (burst cap — matches nginx's `burst=200 nodelay`)
#   tokens_per_fill:  50    (50 tokens refilled every 50 ms …)
#   fill_interval:    0.05s (… = 1000 rps steady refill)
#
# This matches POLICIES.md § p03 and nginx/p03's shape exactly. A
# 1200-request ASAP burst against the cold bucket produces ≈250 ×
# 2xx + ≈950 × 429 (200 initial burst + ≈50 tokens drained from
# the ≈100 ms burst refill window), well above the
# `status_429_min=150 ± 50` threshold the fixture asserts, and
# inside the nginx column's ±30-request band (nginx observed
# 257 × 2xx / 943 × 429).
#
# WHY NOT max_tokens=1000 ?
# -------------------------
# A naive reading of POLICIES.md § p03 ("1000 rps service-wide")
# suggests `max_tokens: 1000, tokens_per_fill: 1000, fill_interval:
# 1s`. That configuration will allow the entire 1200-request ASAP
# burst to fit inside the bucket's initial capacity (1000 + ≈50-200
# refill over the sub-second burst window) and emit only ≈50-100
# × 429 — below the fixture's 100-minimum threshold and nothing
# like the 943 × 429 shape nginx emits for the same fixture.
#
# nginx's `limit_req_zone rate=1000r/s; limit_req burst=200
# nodelay;` is a leaky-bucket with a SMALL burst cap (200) on top
# of a steady 1000 rps leak. envoy's `local_ratelimit` is a
# refillable bucket where `max_tokens` == burst cap (same meaning
# as nginx's `burst`) and `tokens_per_fill / fill_interval` ==
# steady rate. The `200 / 1000r/s` shape above is the one-to-one
# translation.
#
# THREAD MODEL — BUCKET IS SHARED ACROSS WORKERS
# ----------------------------------------------
# envoy.filters.http.local_ratelimit uses a SHARED token bucket by
# default across every worker thread in the process. That is the
# behaviour documented in v1.32's proto reference:
#
#   > By default the token bucket is shared across all workers, thus
#   > the rate limits are applied per Envoy process. [...] This can
#   > be changed by setting `local_rate_limit_per_downstream_connection`
#   > to true, in which case the rate limits are applied per downstream
#   > connection.
#
# We verified this empirically with `--concurrency 1` vs `--concurrency
# 2` at `max_tokens: 500` — both yielded ≈555 passes per 1200-request
# burst (≈500 initial + ≈55 continuous refill during the ~100 ms
# burst window), confirming the bucket is NOT multiplied by worker
# count. Earlier iterations of this file mis-modelled the bucket as
# per-worker and compensated with a halved `max_tokens`; the
# re-derivation means `max_tokens: 1000` here matches the canonical
# rate 1:1.
#
# Everything else (listener, cluster, uniform settings) is identical
# to p01-vanilla so the two cells are apples-to-apples on every
# non-RL axis.

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9080
      reuse_port: true
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: HTTP1
                common_http_protocol_options:
                  idle_timeout: 60s
                  # See p01-vanilla/envoy.yaml: leaving
                  # max_connection_duration UNSET (rather than `0s`) is the
                  # "no maximum" setting — `0s` would close every connection
                  # at t=0 and every request would fail mid-response.
                  max_requests_per_connection: 100000
                stream_idle_timeout: 60s
                request_timeout: 10s
                normalize_path: false
                merge_slashes: false
                server_header_transformation: OVERWRITE
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_vh
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 10s
                http_filters:
                  # -------------------------------------------------------
                  # p03 — static service-wide rate limit
                  # -------------------------------------------------------
                  # The filter lives on the HCM (listener) so every route
                  # shares the same bucket. No descriptors: that keeps
                  # the bucket purely "service-wide" in POLICIES.md's
                  # exact sense.
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: http_local_rl_p03
                      # Process-wide shared token bucket. By default
                      # envoy's local_ratelimit does NOT partition the
                      # bucket per worker (see the file header for the
                      # proto reference + empirical verification).
                      #
                      # max_tokens  == burst cap  (matches nginx burst=200)
                      # fill rate   == steady     (50 / 0.05s = 1000 rps)
                      #
                      # Smallest fill_interval envoy supports is 50 ms;
                      # `tokens_per_fill: 50` delivers the canonical
                      # 1000-rps steady leak with that granularity.
                      token_bucket:
                        max_tokens: 200
                        tokens_per_fill: 50
                        fill_interval: 0.05s
                      # Enable the filter on 100% of traffic. Leaving
                      # these unset still enables the filter (the
                      # runtime-key gate is for staged rollouts) but
                      # spelling them out makes the intent obvious.
                      filter_enabled:
                        runtime_key: local_rate_limit_enabled
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      filter_enforced:
                        runtime_key: local_rate_limit_enforced
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      # Canonical 429 (envoy's default for this filter
                      # is also 429; spelled out for POLICIES.md parity).
                      status:
                        code: TooManyRequests
                      # Stamp `Retry-After: 1` on the rejection
                      # response per docs/POLICIES.md § p03. envoy
                      # otherwise returns a 429 with no retry hint.
                      # The header applies only to rejections emitted
                      # by this filter — normal 2xx responses are
                      # untouched.
                      response_headers_to_add:
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: retry-after
                            value: "1"
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: backend_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 10s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 60s
            max_requests_per_connection: 100000
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
          keepalive_interval: 10
          keepalive_probes: 3
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 8080
