# gateways/wallarm/docker-compose.yaml
#
# Single-gateway stack used by `make parity-gateway` for parity attestation.
# The stack is intentionally minimal and mirrors the layout used by every
# gateway under `gateways/<gw>/`:
#
#     loadgen (host)  →  gateway :9080  →  backend :8080
#                        gateway :9081  (Admin API)
#
# The policy profile is picked by the GATEWAY_PROFILE env var (default
# `p01-vanilla`). Each profile directory must contain:
#   gateway.yaml   - static config for unigw
#   setup.sh       - Admin API bootstrap (services, policies, routes)
#   NOTES.md       - profile-specific notes / deviations
#
# Image is pinned by digest for reproducibility, but can be overridden
# for local validation of unreleased Wallarm builds:
#   WALLARM_IMAGE=wallarm/api-gateway:main-<sha> \
#     make parity-gateway-all PARITY_GATEWAY=wallarm
#
# Refresh the public pin with:
#   docker pull wallarm/api-gateway:0.2.0 && docker image inspect \
#     wallarm/api-gateway:0.2.0 --format '{{index .RepoDigests 0}}'

name: gateway-benchmarks-wallarm

services:
  backend:
    image: gateway-benchmarks/backend:v2.22.1
    container_name: gwb-wallarm-backend
    restart: "no"
    # The backend listens on :8080 inside the container. We do NOT
    # publish the port — only the gateway needs to talk to it, over
    # the private `bench-net` bridge. If you want to probe it
    # directly, add `- "8088:8080"` here temporarily.
    networks:
      bench-net:
        aliases: [backend]

  gateway:
    image: ${WALLARM_IMAGE:-wallarm/api-gateway:0.2.0@sha256:a3d4d2f780e8f1f22b27e2aa450d4a5cfde6d8c51e153a900f63da464393e825}
    container_name: gwb-wallarm
    restart: "no"
    depends_on:
      - backend
    command: ["-c", "/config/gateway.yaml"]
    volumes:
      - ./${GATEWAY_PROFILE:-p01-vanilla}/gateway.yaml:/config/gateway.yaml:ro
    ports:
      - "9080:9080"  # data plane (parity-gateway target)
      - "9081:9081"  # admin API  (setup.sh runs against this)
    networks:
      bench-net:
        aliases: [gateway]

networks:
  bench-net:
    driver: bridge
