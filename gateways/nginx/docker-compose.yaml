# gateways/nginx/docker-compose.yaml
#
# Single-gateway stack used by `make parity-gateway` for parity attestation.
# Same port contract as every other gateway under `gateways/<gw>/`:
#
#     loadgen (host)  →  nginx :9080  →  backend :8080
#
# nginx has **no** admin API: every profile's behaviour is expressed
# entirely in its `nginx.conf` on disk. We therefore only expose the
# data plane on :9080. `scripts/parity-gateway.sh` copes with that —
# the admin-port wait loop is optional, and each nginx profile's
# `setup.sh` is a plain HTTP smoke check.
#
# The policy profile is picked by the GATEWAY_PROFILE env var (default
# `p01-vanilla`). Each profile directory must contain:
#
#   nginx.conf   - full nginx configuration (single-file override)
#   setup.sh     - post-up smoke check (nginx is ready at container start)
#   NOTES.md     - profile-specific notes / deviations
#
# Default image is pinned by digest for reproducibility; refresh with:
#   docker pull nginx:1.27.3-alpine && docker image inspect \
#     nginx:1.27.3-alpine --format '{{index .RepoDigests 0}}'
#
# Profiles that need extra modules (e.g. p08 needs `ngx_headers_more`
# to drop the Server header) override GATEWAY_IMAGE via a per-profile
# `.env` file; scripts/parity-gateway.sh sources it automatically.
# The override image must expose the nginx binary in PATH so the
# hard-coded `command: ["nginx", ...]` below still launches. OpenResty's
# `openresty/openresty:*-alpine` images fit that contract out of the
# box (the `nginx` symlink points at `/usr/local/openresty/nginx/sbin/nginx`).

name: ${BENCH_COMPOSE_PROJECT:-gateway-benchmarks-nginx}

services:
  backend:
    image: gateway-benchmarks/backend:v2.22.1
    container_name: ${BENCH_CONTAINER_PREFIX:-gwb-nginx}-backend
    restart: "no"
    # Backend listens on :8080 inside the container. We do NOT publish
    # it on the host — only the gateway needs to talk to it, over the
    # private `bench-net` bridge. Add `- "8088:8080"` temporarily if
    # you want to probe it from the host.
    networks:
      bench-net:
        aliases: [backend]

  gateway:
    image: ${GATEWAY_IMAGE:-nginx:1.27.3-alpine@sha256:814a8e88df978ade80e584cc5b333144b9372a8e3c98872d07137dbf3b44d0e4}
    container_name: ${BENCH_CONTAINER_PREFIX:-gwb-nginx}
    restart: "no"
    depends_on:
      - backend
    # `nginx -g 'daemon off;'` is the default entrypoint; we just
    # override the config file path to keep the volume mount obvious.
    command: ["nginx", "-c", "/etc/nginx/nginx.conf", "-g", "daemon off;"]
    volumes:
      - ./${GATEWAY_PROFILE:-p01-vanilla}/nginx.conf:/etc/nginx/nginx.conf:ro
      # Shared Lua library mounted at a path that only OpenResty reads.
      # Mainline nginx does not load it (no `lua_package_path`, no
      # lua_module compiled in) so the mount is effectively a no-op
      # for mainline profiles (p01/p04/p05/p06/p07/p08). OpenResty
      # profiles (p02/p03/p09/p10/p11/p12) pick it up via
      # `lua_package_path` in their nginx.conf.
      - ./_shared/lualib:/usr/local/openresty/lualib/bench:ro
      # Reference JWKS/RSA material — identical across every nginx
      # profile so the mount lives here, not in a per-profile
      # override. Only the `p03-jwks-rs256-basic` profile
      # actually reads from /etc/nginx/jwks-rs256/ (its
      # init_by_lua_block slurps jwks.json + public.pem + kid.txt at
      # worker start). Every other profile's nginx.conf simply
      # ignores the path, so the mount is inert for the other
      # eleven profiles — no side effects, no drift across columns.
      # See gateways/nginx/p03-jwks-rs256-basic/NOTES.md and
      # gateways/_reference/jwks-rs256/README.md.
      - ../_reference/jwks-rs256:/etc/nginx/jwks-rs256:ro
      # Reference TLS material (shared bench.local cert + key, valid
      # until 2126). Only the p01-vanilla and p12-full-pipeline
      # profiles read from /etc/nginx/tls/ today — they each ship a
      # second `listen 9443 ssl;` server block that backs the
      # s13-vanilla-https and s14-full-pipeline-https k6 scenarios
      # respectively. Every other nginx profile ignores the path
      # (their nginx.conf has no `ssl_certificate` directive), so the
      # mount is inert and leaves their HTTP-only behaviour untouched.
      # See gateways/_reference/tls/ and docs/POLICIES.md § HTTPS.
      - ../_reference/tls:/etc/nginx/tls:ro
    ports:
      - "${GATEWAY_HTTP_PORT:-9080}:9080"  # data plane (parity-gateway target, HTTP/1.1)
      # TLS data plane — only meaningful on profiles that actually
      # listen on :9443 (currently p01-vanilla and p12-full-pipeline).
      # On every other profile the host-side bind succeeds but the
      # connection refuses inside the container; the s13/s14 scenarios
      # are gated on BENCH_TARGET_URL_HTTPS so they only fire when
      # GATEWAY_PROFILE actually serves TLS.
      - "${GATEWAY_HTTPS_PORT:-9443}:9443"
    # nginx handles SIGTERM gracefully; the stop-grace-period is kept
    # low so `docker compose down` in teardown is snappy even on CI.
    stop_grace_period: 5s
    networks:
      bench-net:
        aliases: [gateway]

networks:
  bench-net:
    driver: bridge
