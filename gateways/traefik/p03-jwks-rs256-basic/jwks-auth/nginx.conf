# gateways/traefik/p03-jwks-rs256-basic/jwks-auth/nginx.conf
#
# JWT / JWKS auth sidecar for the `p03-jwks-rs256-basic`
# traefik scenario. Runs on the same pinned OpenResty image as the
# nginx column's p03-jwks-rs256-basic profile
# (openresty/openresty:1.27.1.2-alpine) and reuses its two Lua
# modules (jwt_rs256_verify.lua + jwt_rs256_jwks.lua), which are
# column-local copies under ./lualib/.
#
# This config is deliberately minimal — traefik's `forwardAuth`
# middleware only cares about the HTTP status code returned by the
# auth URL (2xx = allow, anything else = deny; see
# https://doc.traefik.io/traefik/middlewares/http/forwardauth/).
# We expose a single catch-all location that:
#
#   * Reads `Authorization: Bearer <jwt>` from the forwarded request
#     headers (traefik forwards the original request's headers
#     verbatim).
#   * Dispatches to `jwt_rs256_jwks.verify(authz)` — b64url decode,
#     kid → EVP_PKEY* lookup, RS256 verify via FFI, exp check.
#   * Returns `200` on success (traefik lets the request through)
#     or `401` on failure (traefik terminates with 401 to the
#     downstream client).
#
# No body, no logging of secrets, no proxy_pass — this service's
# sole output is a status code.

user                 nobody;
worker_processes     auto;
worker_rlimit_nofile 65535;

error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    access_log off;
    keepalive_timeout    60s;
    keepalive_requests   100000;
    tcp_nodelay          on;
    sendfile             on;

    default_type application/octet-stream;

    # Lua search path — docker-compose bind-mounts
    # ./jwks-auth/lualib at /usr/local/openresty/lualib/bench/, so
    # `require("jwt_rs256_jwks")` resolves there. Trailing `;;`
    # keeps OpenResty's bundled modules (cjson.safe, resty.core, ...)
    # discoverable.
    lua_package_path "/usr/local/openresty/lualib/bench/?.lua;;";

    # JWKS ingestion runs once per worker at nginx start. The three
    # reference files come from gateways/_reference/jwks-rs256/,
    # bind-mounted at /etc/nginx/jwks-rs256/ via the sidecar's
    # volumes entry in docker-compose.yaml — SAME mount path as the
    # nginx column's p03-jwks-rs256-basic profile. See:
    #   gateways/traefik/docker-compose.yaml (services.jwks-auth)
    #   gateways/nginx/p03-jwks-rs256-basic/NOTES.md
    init_by_lua_block {
        local bench_jwks = require("jwt_rs256_jwks")

        local function slurp(path)
            local f, oerr = io.open(path, "rb")
            if not f then
                error("init: cannot open " .. path .. ": " .. tostring(oerr))
            end
            local body = f:read("*a")
            f:close()
            return body
        end

        local jwks_str = slurp("/etc/nginx/jwks-rs256/jwks.json")
        local pem_str  = slurp("/etc/nginx/jwks-rs256/public.pem")
        local kid      = slurp("/etc/nginx/jwks-rs256/kid.txt"):gsub("%s+$", "")

        if kid == "" then
            error("init: /etc/nginx/jwks-rs256/kid.txt is empty")
        end

        bench_jwks.init(jwks_str, { [kid] = pem_str })
    }

    server {
        listen      9091 reuseport;
        server_name jwks-auth;

        # Catch-all: traefik forwardAuth may hit any path (our
        # middleware uses `address: "http://jwks-auth:9091/verify"`
        # but we accept any path for defense in depth — a future
        # config typo pointing at a different path would otherwise
        # 404 and silently allow every request through).
        location / {
            access_by_lua_block {
                local bench_jwks = require("jwt_rs256_jwks")
                local authz = ngx.var.http_authorization
                local ok, err = bench_jwks.verify(authz)
                if not ok then
                    -- INFO level so high-volume 401 probes don't
                    -- spam the compose log. Same convention as
                    -- the nginx-column profile.
                    ngx.log(ngx.INFO, "jwks-rs256 reject: ", err or "unknown")
                    return ngx.exit(401)
                end
                -- Authorized: return 200 with no body. Traefik only
                -- looks at the status; body is ignored.
                ngx.status = 200
                return ngx.exit(200)
            }
        }
    }
}
