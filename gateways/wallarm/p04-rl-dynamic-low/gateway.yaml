# gateways/wallarm/p04-rl-dynamic-low/gateway.yaml
#
# Profile p04-rl-dynamic-low: rate-limit keyed on X-Real-IP,
# 10 req/s per IP, rolling 1-second window.
# Static config is identical to p01-vanilla — every profile-specific
# piece lives in setup.sh (Admin API bootstrap) and NOTES.md.

net:
  http_port: 9080

admin:
  listen_address: "0.0.0.0"
  listen_port: 9081

persistence:
  enabled: false

upstream:
  pool:
    size: 1024
    idle_timeout_ms: 60000
  tcp:
    keepalive_secs: 90
    nodelay: true
    reuse_address: true
