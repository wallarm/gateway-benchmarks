# gateways/traefik/p01-vanilla/dynamic.yaml
#
# Dynamic config for p01-vanilla. One router → one service; no
# middleware, no plugin. Behaviour equivalent to envoy / nginx /
# wallarm p01 cells: the gateway acts as a bare pass-through.

http:
  routers:
    # Catch-all router — matches any request on the `web` entryPoint.
    # `PathPrefix(/)` is the simplest rule that still expresses
    # "every URL" unambiguously (compare to `HostRegexp(.*)` which
    # fails on Host header quirks). No middleware list → the request
    # goes straight from the router to the service.
    backend:
      entryPoints:
        - web
      rule: "PathPrefix(`/`)"
      service: backend
      priority: 1

    # Phase 5 — TLS twin of the `backend` router for s13-vanilla-https.
    # Same service, same rule, just bound to the `websecure` entryPoint
    # with TLS enabled. The cert is selected by the catch-all default
    # store below; bench.crt SAN covers bench.local / localhost /
    # gateway / 127.0.0.1, matching every form k6 / parity / curl use.
    backend-tls:
      entryPoints:
        - websecure
      rule: "PathPrefix(`/`)"
      service: backend
      priority: 1
      tls: {}

  services:
    # Single upstream — same `backend:8080` address every other
    # gateway targets. passHostHeader: false so the upstream sees
    # its own hostname (go-httpbin doesn't care, but the envoy /
    # nginx cells both pass through the gateway's normalized Host
    # value, and we want the same wire shape).
    backend:
      loadBalancer:
        passHostHeader: false
        servers:
          - url: http://backend:8080

# Phase 5 — TLS material for the `websecure` entryPoint. Files mounted
# at /etc/traefik/tls/ via docker-compose volume from
# gateways/_reference/tls/. `default` makes this the cert traefik serves
# when SNI doesn't match anything more specific — exactly what we want
# for the catch-all bench setup.
tls:
  certificates:
    - certFile: /etc/traefik/tls/bench.crt
      keyFile: /etc/traefik/tls/bench.key
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/tls/bench.crt
        keyFile: /etc/traefik/tls/bench.key
