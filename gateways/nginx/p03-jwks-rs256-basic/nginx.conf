# gateways/nginx/p03-jwks-rs256-basic/nginx.conf
#
# Policy profile p03-jwks-rs256-basic (12-profile matrix): RS256 JWT validation
# matrix; lives parallel to p02-jwt). Canonical description:
# docs/POLICIES.md § p03-jwks-rs256-basic.
# Canonical fixture: fixtures/p03-jwks-rs256-basic.jsonl.
#
# OpenResty realises "RS256 + JWKS, validate `kid` before verifying
# signature" via a small, focused pair of Lua modules in
# `_shared/lualib/`:
#
#   * jwt_rs256_verify.lua — FFI wrapper over OpenSSL 3.x libcrypto.
#                            Exposes `load_pubkey_pem` and
#                            `verify_rs256(pkey, signing_input, sig)`.
#                            Uses `EVP_DigestVerify*` — the same code
#                            path envoy's `jwt_authn` eventually calls
#                            through BoringSSL.
#   * jwt_rs256_jwks.lua   — JWT layer: parse header, dispatch by
#                            `kid` to an in-memory
#                            { [kid] = EVP_PKEY* } map, RS256 verify
#                            via FFI, check `exp`. Hot path does one
#                            table lookup + one FFI call, no per-
#                            request PEM parsing.
#
# Why FFI (and not pure-Lua RS256):
#
#   * Pure-Lua RSASSA-PKCS1-v1_5 requires bigint modexp over 2048-bit
#     N (c^e mod N). That is ~150 LoC of tight, error-prone LuaJIT
#     bigint arithmetic we would have to audit ourselves. The FFI
#     path is three ffi.cdef entries plus `EVP_DigestVerify*` — the
#     same C functions libssl itself uses.
#   * `libcrypto.so` is already in the pinned
#     `openresty/openresty:1.27.1.2-alpine` image (OpenSSL 3.5.5
#     under /usr/local/openresty/openssl3/lib/). No opm install, no
#     custom Dockerfile, no reproducibility concession.
#
# Why this image (OpenResty, not mainline nginx):
#
#   * Same image p02-jwt / p08 / p09 / p10 / p11 pin (see `.env`).
#   * OpenResty is the only published nginx distribution that ships
#     `ngx_http_lua_module`, `lua-cjson`, and `lua-resty-core` as a
#     single ready-to-run image. Mainline nginx has no Lua story
#     without a custom build.
#
# The request lifecycle position of `access_by_lua_block` mirrors
# envoy's `jwt_authn` filter running before the router, and wallarm's
# `jwt_validation` policy running at the `request_flow` phase — JWT
# rejection happens before any upstream connection.

user                 nobody;
worker_processes     auto;
worker_rlimit_nofile 65535;

error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    access_log           off;
    keepalive_timeout    60s;
    keepalive_requests   100000;
    tcp_nodelay          on;
    tcp_nopush           off;
    sendfile             on;

    proxy_request_buffering   off;
    proxy_buffering           off;

    proxy_http_version 1.1;
    proxy_set_header   Connection           "";
    proxy_set_header   Host                 $http_host;
    proxy_set_header   X-Real-IP            $remote_addr;
    proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto    $scheme;

    proxy_connect_timeout   10s;
    proxy_send_timeout      10s;
    proxy_read_timeout      10s;

    upstream backend_pool {
        server backend:8080;
        keepalive         1024;
        keepalive_time    1h;
        keepalive_timeout 60s;
        keepalive_requests 100000;
    }

    default_type  application/octet-stream;

    # Shared Lua library (jwt_rs256_verify, jwt_rs256_jwks,
    # jwt_hs256, body_rewrite) — bind-mounted read-only from
    # `_shared/lualib/` (see ../docker-compose.yaml). Trailing `;;`
    # appends OpenResty's default search path so bundled modules
    # (cjson.safe, resty.core, ...) still resolve.
    lua_package_path "/usr/local/openresty/lualib/bench/?.lua;;";

    # -----------------------------------------------------------------
    # init_by_lua_block runs once per worker at nginx start. We do ALL
    # of the JWKS ingestion + PEM loading here so the request hot path
    # only does b64url decode, one table lookup, and one
    # EVP_DigestVerifyFinal.
    #
    # The reference JWKS, PEM, and canonical kid are mounted read-only
    # from `gateways/_reference/jwks-rs256/` via the shared compose
    # volume — see docker-compose.yaml for the bind. setup.sh verifies
    # on every boot that the mount resolves and matches the
    # canonical reference material.
    # -----------------------------------------------------------------
    init_by_lua_block {
        local cjson_safe = require("cjson.safe")
        local bench_jwks = require("jwt_rs256_jwks")

        local function slurp(path)
            local f, oerr = io.open(path, "rb")
            if not f then
                error("init: cannot open " .. path .. ": " .. tostring(oerr))
            end
            local body = f:read("*a")
            f:close()
            return body
        end

        -- The three files come from gateways/_reference/jwks-rs256/,
        -- mounted at /etc/nginx/jwks-rs256/ by docker-compose.yaml.
        local jwks_str = slurp("/etc/nginx/jwks-rs256/jwks.json")
        local pem_str  = slurp("/etc/nginx/jwks-rs256/public.pem")
        local kid      = slurp("/etc/nginx/jwks-rs256/kid.txt"):gsub("%s+$", "")

        if kid == "" then
            error("init: /etc/nginx/jwks-rs256/kid.txt is empty")
        end

        -- Single-entry PEM map: the reference material carries exactly
        -- one (kid, PEM) pair. A future N-key JWKS rotation would
        -- mount N per-kid PEMs; the init block generalises trivially.
        bench_jwks.init(jwks_str, { [kid] = pem_str })
    }

    server {
        listen                 9080 reuseport;
        server_name            bench-nginx;

        location / {
            access_by_lua_block {
                local bench_jwks = require("jwt_rs256_jwks")
                local authz = ngx.var.http_authorization
                local ok, err = bench_jwks.verify(authz)
                if not ok then
                    -- INFO level so the parity runner's 401 probes do
                    -- not spam container logs (same convention as the
                    -- p02-jwt profile).
                    ngx.log(ngx.INFO, "jwks-rs256 reject: ", err or "unknown")
                    return ngx.exit(401)
                end
            }
            proxy_pass http://backend_pool;
        }

        # Stamp a WWW-Authenticate header on every 401 (RFC 6750 §3).
        # Not asserted by the fixture but matches the production
        # shape a real JWT/JWKS gateway would emit.
        error_page 401 = @unauthorized;
        location @unauthorized {
            internal;
            add_header WWW-Authenticate 'Bearer realm="bench", charset="UTF-8"' always;
            default_type application/json;
            return 401 '{"error":"unauthorized","reason":"jwks_rs256_validation_failed"}';
        }
    }
}
