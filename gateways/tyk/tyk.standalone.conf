{
  "_comment": "gateways/tyk/tyk.standalone.conf — shared across every profile",
  "_comment_2": "Based on upstream https://github.com/TykTechnologies/tyk-gateway-docker/blob/master/tyk.standalone.conf with the minimum diffs needed to host the benchmark.",
  "_comment_3": "All knobs that do not affect the measured axis are kept verbatim so external reviewers can diff against vanilla Tyk.",
  "log_level": "info",
  "_comment_listen_port": "Aligned with the canonical bench port contract — every gateway under gateways/<gw>/ exposes its data plane on container :9080. k6 runs inside bench-net and dials http://gateway:9080 directly (no docker port-mapping is involved for container-to-container traffic), so an internal listener on a different port silently produced 100% TCP refused while parity (which uses the host port-map) still passed. Aligning the internal port keeps both code paths honest.",
  "listen_port": 9080,
  "secret": "gateway-benchmarks",
  "template_path": "/opt/tyk-gateway/templates",
  "tyk_js_path": "/opt/tyk-gateway/js/tyk.js",
  "middleware_path": "/opt/tyk-gateway/middleware",
  "use_db_app_configs": false,
  "app_path": "/opt/tyk-gateway/apps/",
  "storage": {
    "type": "redis",
    "host": "tyk-redis",
    "port": 6379,
    "username": "",
    "password": "",
    "database": 0,
    "optimisation_max_idle": 2000,
    "optimisation_max_active": 4000
  },
  "enable_analytics": false,
  "analytics_config": {
    "type": "",
    "ignored_ips": []
  },
  "health_check": {
    "enable_health_checks": false,
    "health_check_value_timeouts": 60
  },
  "enable_non_transactional_rate_limiter": true,
  "enable_sentinel_rate_limiter": false,
  "enable_redis_rolling_limiter": false,
  "allow_master_keys": false,
  "policies": {
    "policy_source": "file",
    "policy_record_name": "/opt/tyk-gateway/policies/policies.json"
  },
  "hash_keys": true,
  "close_connections": false,
  "http_server_options": {
    "enable_websockets": true
  },
  "allow_insecure_configs": true,
  "coprocess_options": {
    "enable_coprocess": false
  },
  "enable_bundle_downloader": true,
  "bundle_base_url": "",
  "global_session_lifetime": 100,
  "force_global_session_lifetime": false,
  "max_idle_connections_per_host": 500,
  "_comment_jsvm": "JS VM enabled so the per-IP rate limit (p05/p06) and request-body rewrite (p09) profiles can use Tyk's documented JS pre-middleware pattern without pulling in coprocess/gRPC. The VM is otto-based and ships with the OSS image; no extra dependencies. Profiles that don't reference custom_middleware.* simply never use it.",
  "enable_jsvm": true,
  "_comment_xff": "xff_depth controls which IP Tyk treats as the client IP based on the X-Forwarded-For header. We deliberately leave it at the default (0 = first IP) because we never use Tyk-derived client IPs — the bench reads X-Real-IP directly from the request header in the JSVM rate limit middleware (p05/p06), bypassing Tyk's own XFF parsing entirely.",
  "_comment_xff_outbound": "Tyk's reverse proxy unconditionally stamps an outbound X-Forwarded-For with the request's RemoteAddr. There is no native config knob to disable this — see the tyk/p08-req-headers/FEATURE-MISSING marker for the architectural rationale."
}
