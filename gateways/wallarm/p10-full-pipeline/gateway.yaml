# gateways/wallarm/p10-full-pipeline/gateway.yaml
#
# Profile p10-full-pipeline: JWT -> RL -> request transforms -> response transforms.
# Same listener / pool settings as the standalone wallarm profiles.

net:
  http_port: 9080

admin:
  listen_address: "0.0.0.0"
  listen_port: 9081

persistence:
  enabled: false

upstream:
  pool:
    size: 1024
    idle_timeout_ms: 60000
  tcp:
    keepalive_secs: 90
    nodelay: true
    reuse_address: true
