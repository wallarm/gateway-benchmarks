# gateways/tyk/_shared/tls-terminator/nginx.conf
#
# Phase 5 — TLS-terminator sidecar that fronts the Tyk OSS gateway on
# port :9443. Tyk OSS exposes a single global flag
# `http_server_options.use_ssl` that flips EVERY listener to TLS-only,
# so the gateway cannot serve plain HTTP on :9080 *and* HTTPS on :9443
# from the same process. The supported workaround in production
# deployments of Tyk OSS is exactly what we do here: a thin TLS
# terminator (nginx, AWS ALB, stunnel, etc.) in front of Tyk.
#
# What we measure with this in place is therefore the **stack**
# (nginx-TLS termination + Tyk plaintext processing), not Tyk's own
# TLS implementation. The deviation is recorded in
# docs/GATEWAYS.md § Tyk and surfaced in the per-cell parity row.
#
# The sidecar is intentionally minimal — it owns nothing but
# (a) the TLS handshake and (b) a verbatim proxy_pass to gateway:9080
# on bench-net. No buffering, no header rewriting, no compression —
# every request flows through unchanged so the s13/s14 numbers stay
# attributable to Tyk's policy stack.

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

# Mirror the bench-wide error log policy: errors to stderr, no info
# spam on the hot path.
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 16384;
    multi_accept       on;
    use                epoll;
}

http {
    # Hot-path silence — same posture as the nginx-column proper.
    access_log off;

    sendfile         on;
    tcp_nopush       on;
    tcp_nodelay      on;
    keepalive_timeout 60s;

    # Upstream points at the Tyk container by its bench-net DNS alias.
    # `keepalive 1024` reuses the proxy<-Tyk plaintext socket pool, so
    # the marginal cost of the TLS hop is bounded to the handshake +
    # encrypt/decrypt — not "open a new TCP connection per request".
    upstream tyk_upstream {
        server gateway:9080;
        keepalive 1024;
    }

    server {
        listen 9443 ssl reuseport;
        server_name _;

        ssl_certificate           /etc/nginx/tls/bench.crt;
        ssl_certificate_key       /etc/nginx/tls/bench.key;
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL_tyk:10m;
        ssl_session_timeout       10m;

        # Pass-through proxy. We deliberately do NOT set X-Forwarded-*
        # here so Tyk's own header handling stays the SOLE source of
        # truth for p07 / p08 / p11 — adding a second X-Forwarded-For
        # mutator in the chain would silently corrupt the bench's
        # request-header / response-header parity probes.
        location / {
            proxy_pass         http://tyk_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
        }
    }
}
