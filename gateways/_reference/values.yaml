# gateways/_reference/values.yaml
#
# Single source of truth for every constant used by the benchmark.
# Both `scripts/parity-attestation.sh` and every `gateways/<gw>/...`
# config render from this file. If you change a value here, the
# gateway configs should be re-rendered and the parity probes rerun.

bench:
  service_name: bench-service
  # Everything below this line describes values observable from outside
  # the gateway. They must match byte for byte in every gateway config.

upstream:
  host: backend
  port: 8080
  path: /anything
  # Gateway keep-alive / pool sizing. TASK.md §10: uniform across gateways.
  pool:
    size: 1024
    idle_timeout_s: 60
    keepalive: on

downstream:
  keepalive: on
  request_timeout_s: 10
  # Buffering is "off" wherever the gateway exposes that toggle. Where
  # it cannot be fully disabled, documented deviations go into
  # docs/GATEWAYS.md.
  buffering:
    request: off
    response: off

http:
  # TASK.md §6: HTTP/1.1 only, forcibly disable HTTP/2 and HTTP/3.
  versions: ["1.1"]
  alpn: ["http/1.1"]

# -----------------------------------------------------------------------------
# Per-profile values
# -----------------------------------------------------------------------------

# p02 — JWT
jwt:
  algorithm: HS256
  # NOTE: this secret is public by design. It has never been used in
  # production. It only exists to let external reviewers reproduce the
  # JWT probes.
  secret: "bench-jwt-hs256-secret-2026"
  header:
    name: Authorization
    scheme: Bearer
  payload:
    sub: bench
    role: tester
    iss: gateway-benchmarks
  expiry_s: 3600
  # Gateways that cannot consume a shared secret directly fall back to
  # JWKS served from the benchmark's internal URL below.
  jwks:
    url: "http://loadgen:8081/.well-known/jwks.json"
    kid: "bench-hs256-2026"

# p03 — Static rate limit
rl_static:
  # Requests per second, per service. Above-limit responses are 429
  # with Retry-After: 1. Rolling 1 s window, keyed per service.
  limit_rps: 1000
  window_s: 1
  key: service

# p04 — Per-endpoint static rate limit
#
# Same shape as p03 (rolling 1 s window, 429 with Retry-After: 1), but
# the bucket is attached to ONE specific endpoint path — every other
# path on the same gateway must stay unrestricted. This is the
# "scope-a-policy-to-one-route" axis (particularly relevant for
# Tyk / Kong / APISIX, whose RL primitives are authored as API-level
# policies with a route selector, rather than a network-level filter).
rl_endpoint:
  limit_rps: 100
  window_s: 1
  # Client-visible path that receives the rate-limit policy. Gateways
  # must bind the RL primitive specifically to this path prefix.
  limited_path: /anything/limited
  # Client-visible path that MUST remain unrestricted — the scoping
  # invariant is checked by firing an identical-shape burst here and
  # asserting zero 429 responses.
  free_path: /anything/free

# p05 — Dynamic rate limit (low cardinality)
rl_dynamic_low:
  limit_rps: 10
  window_s: 1
  key_header: X-Real-IP
  pool_size: 100

# p06 — Dynamic rate limit (high cardinality)
rl_dynamic_high:
  limit_rps: 100
  window_s: 1
  key_header: X-Real-IP
  pool_size: 50000

# p07 — Request headers rewrite
req_headers:
  add:
    - name: X-Bench-In
      value: "1"
  drop:
    - X-Forwarded-For

# p08 — Response headers rewrite
resp_headers:
  add:
    - name: X-Bench-Out
      value: "1"
  drop:
    - Server

# p09 — Request body rewrite (JSON)
req_body:
  add:
    path: $.bench.injected
    value: true
  drop:
    path: $.secret

# p10 — Response body rewrite (JSON)
# `$.origin` is chosen because go-httpbin's /anything always puts the
# client IP there, so the drop-rule is always exercised.
resp_body:
  add:
    path: $.bench.injected
    value: true
  drop:
    path: $.origin

# p11 — Full pipeline is the composition of the six above, in this
# exact order:
full_pipeline:
  order:
    - jwt
    - rl_static
    - req_headers
    - req_body
    - resp_headers
    - resp_body

# -----------------------------------------------------------------------------
# p03-jwks-rs256-basic (NOT part of the 12-profile matrix)
# -----------------------------------------------------------------------------
# These scenarios exercise axes that are orthogonal to the canonical
# ten profiles. They are driven by the same parity-attestation harness
# and the same `make parity-gateway PARITY_GATEWAY=<gw>
# PARITY_PROFILE=<slug>` entry point, but they do NOT appear in the
# `parity-gateway-all` sweep or in the ranking matrix — running them
# is always a deliberate opt-in.
#
# The rationale is "don't reshape the matrix to measure an extra
# capability" — e.g. RS256+JWKS is a genuinely different axis from
# HS256, but core p02-jwt intentionally locks HS256 so it reads the
# same question on every gateway.

# p03-jwks-rs256-basic — RS256 signature validation against a static,
# inline JWKS. Separate from p02-jwt so that neither this scenario
# nor p02 has to flex its binding shape to accommodate the other.
#
# Canonical shape:
#   - Algorithm: RS256 (asymmetric)
#   - JWKS: inline (`{keys: [...]}`), NOT jwks_uri (iteration 2 material)
#   - Key id: a single canonical `kid` stamped into every token
#     header and into the JWKS's only JWK
#   - Payload: reuses `jwt.payload` below so the claim shape stays
#     identical to the HS256 probes (sub/role/iss)
#   - Token header: `Authorization: Bearer <jwt>` (same envelope as p02)
jwks_rs256_basic:
  algorithm: RS256
  kid_source: gateways/_reference/jwks-rs256/kid.txt
  private_key_path: gateways/_reference/jwks-rs256/private.pem
  public_key_path:  gateways/_reference/jwks-rs256/public.pem
  jwks_path:        gateways/_reference/jwks-rs256/jwks.json
  header:
    name: Authorization
    scheme: Bearer
  # The payload template is shared with p02-jwt on purpose (one less
  # moving part across scenarios). Expiry matches p02-jwt too.
  payload_path: gateways/_reference/jwt/payload-template.json
  expiry_s: 3600
  unknown_kid_value: unknown-kid-2026

# -----------------------------------------------------------------------------
# Parity attestation tolerances (see docs/POLICIES.md)
# -----------------------------------------------------------------------------
parity:
  # p03: fire 1200 requests in 1 s — we expect at least 150 × 429 and
  # tolerate ±50 around the exact expected count.
  p04_expected_429_min: 150
  p04_expected_429_tolerance: 50

  # p04: same 1200-req ASAP burst, two probes.
  #   - on /anything/limited (100-rps bucket): expect >=150 × 429 ±50
  #     (100 initial tokens + tiny refill during the ~100 ms burst)
  #   - on /anything/free    (unrestricted):  expect 0 × 429 and
  #     >=1100 × 2xx (scoping invariant — not a single miss allowed)
  p05_limited_expected_429_min: 150
  p05_limited_expected_429_tolerance: 50
  p05_free_expected_2xx_min: 1100
  p05_free_expected_429_max: 0

  # p05: 10 distinct IPs × 15 req/s × 3 s = 450 requests, ~50% above
  # limit. We expect ~150 × 429 (tolerance ±30).
  p05_expected_429_min: 120
  p05_expected_429_tolerance: 30
