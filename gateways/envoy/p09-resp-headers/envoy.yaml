# gateways/envoy/p09-resp-headers/envoy.yaml
#
# Profile: p09-resp-headers.
# Canonical spec: docs/POLICIES.md § p08 — add X-Bench-Out: 1 to the
#   downstream response, drop the Server header.
# Canonical fixture: fixtures/p09-resp-headers.jsonl
#
# Entirely native envoy — no Lua filter, no sidecar. The canonical
# pair of knobs is:
#
#   1. `server_header_transformation: PASS_THROUGH` on the HCM.
#      Envoy's default is OVERWRITE, which unconditionally stamps
#      `Server: envoy` on every response AFTER our route-level
#      header transforms run. Switching to PASS_THROUGH tells the
#      HCM not to touch the header at all; whatever the upstream
#      set passes through verbatim. Only then can step 2 below
#      actually strip it.
#
#   2. `response_headers_to_remove: [server]` on the virtual_host.
#      This runs in the route-level header-mutation stage, BEFORE
#      the HCM's server_header_transformation. With step 1 set to
#      PASS_THROUGH, the removal is final: envoy does not re-add.
#      (This is the mapping that turns the otherwise non-deletable
#      Server knob into an actual drop — see envoy issue tracker
#      for the historical context on why OVERWRITE is the default.)
#
# The X-Bench-Out injection is straightforward
# `response_headers_to_add` at the virtual_host scope, with
# `append_action: OVERWRITE_IF_EXISTS_OR_ADD` so we always emit
# exactly the bench value even if the upstream (e.g. fixture probe 1
# with /response-headers?X-Bench-Out=...) tried to shape it.
#
# Probe 1 — `/response-headers?Server=should-be-dropped` — has
# go-httpbin synthesize a Server header with the given value. The
# fixture expects it to be absent downstream; the combination above
# drops it.
#
# Probe 2 — `/get` — exercises the unconditional drop path: even when
# go-httpbin does NOT set Server itself, PASS_THROUGH stops envoy
# from stamping its own, so the downstream response ends up with no
# Server header at all.
#
# Everything else (listener, cluster, uniform settings) is identical
# to p01-vanilla so the only axis the fixture can measure is the
# response-header transform itself.

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9080
      reuse_port: true
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: HTTP1
                common_http_protocol_options:
                  idle_timeout: 60s
                  # See p01-vanilla/envoy.yaml: leaving
                  # max_connection_duration UNSET is the "no maximum"
                  # setting; `0s` would close every connection at t=0.
                  max_requests_per_connection: 100000
                stream_idle_timeout: 60s
                request_timeout: 10s
                normalize_path: false
                merge_slashes: false
                # ----- p08 anchor #1: don't stamp `Server: envoy` -----
                # PASS_THROUGH means "don't touch the Server header";
                # the HCM now respects whatever upstream sent AND our
                # route-level `response_headers_to_remove` on it.
                server_header_transformation: PASS_THROUGH
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_vh
                      domains: ["*"]
                      # --- p08 anchor #2: inject X-Bench-Out -----
                      # OVERWRITE_IF_EXISTS_OR_ADD guarantees the value
                      # is exactly "1" even when the upstream (go-httpbin's
                      # /response-headers endpoint) tried to shape the
                      # header surface itself.
                      response_headers_to_add:
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: x-bench-out
                            value: "1"
                      # --- p08 anchor #3: drop Server -------------
                      # Runs BEFORE server_header_transformation so when
                      # the upstream (or fixture injection) supplies a
                      # Server value, it is stripped. With PASS_THROUGH
                      # above, envoy will not re-add "envoy" after us.
                      response_headers_to_remove:
                        - server
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 10s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: backend_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 10s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 60s
            max_requests_per_connection: 100000
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
          keepalive_interval: 10
          keepalive_probes: 3
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 8080
