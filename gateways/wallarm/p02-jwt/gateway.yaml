# gateways/wallarm/p02-jwt/gateway.yaml
#
# Profile p02-jwt: native JWT validation on the request path.
# Same listener / pool settings as p01-vanilla so only the policy changes.

net:
  http_port: 9080

admin:
  listen_address: "0.0.0.0"
  listen_port: 9081

persistence:
  enabled: false

upstream:
  pool:
    size: 1024
    idle_timeout_ms: 60000
  tcp:
    keepalive_secs: 90
    nodelay: true
    reuse_address: true
