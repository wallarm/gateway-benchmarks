# gateways/nginx/p04-rl-dynamic-low/nginx.conf
#
# Profile: p04-rl-dynamic-low (per-client-IP rate limit, low cardinality).
# Canonical spec: docs/POLICIES.md § p04
# Canonical fixture: fixtures/p04-rl-dynamic-low.jsonl
#
# Limit:        10 req/s per client IP
# Key source:   X-Real-IP header (nginx variable $http_x_real_ip)
# IP pool:      100 distinct IPs per POLICIES.md (fixture exercises 10)
# Over-limit:   HTTP 429 with Retry-After: 1
#
# Zone sizing: the shared memory zone needs to hold one slot per
# *distinct key* that has been observed. nginx reserves roughly 128
# bytes per key (the IP plus book-keeping), so 1 MB fits >= 8 000
# keys comfortably — an order of magnitude above the POLICIES
# ceiling of 100 for p04. We keep the zone at 1 MB (the conventional
# floor) because anything smaller would force us to trim ENABLE
# expiries; p05 will bump the zone to 10 MB for its 50 000-IP pool.
#
# Burst sizing: `burst=10 nodelay` gives every IP one full second's
# worth of headroom before 429s start streaming. Under the fixture's
# ASAP 45-req-per-IP over nominal 3 s we observe ~10 × 2xx +
# ~35 × 429 per IP (the 1 rate-free token + 10 burst slots, the rest
# rejected). This keeps the aggregate shape (~100 × 2xx +
# ~350 × 429) in the same ball-park as wallarm/p04 and well above
# the fixture's `status_429_min=120 ± 30` minimum of 90.

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    # -------------------------------------------------------------------------
    # Uniform settings (same as p01/p03)
    # -------------------------------------------------------------------------
    access_log           off;
    keepalive_timeout    60s;
    keepalive_requests   100000;
    tcp_nodelay          on;
    tcp_nopush           off;
    sendfile             on;

    proxy_request_buffering   off;
    proxy_buffering           off;

    proxy_http_version 1.1;
    proxy_set_header   Connection           "";
    proxy_set_header   Host                 $http_host;
    proxy_set_header   X-Real-IP            $remote_addr;
    proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto    $scheme;

    proxy_connect_timeout   10s;
    proxy_send_timeout      10s;
    proxy_read_timeout      10s;

    upstream backend_pool {
        server backend:8080;
        keepalive         1024;
        keepalive_time    1h;
        keepalive_timeout 60s;
        keepalive_requests 100000;
    }

    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # p04 — per-IP rate limit (10 rps per X-Real-IP)
    # -------------------------------------------------------------------------
    # The key is the raw X-Real-IP header value. When the header is
    # absent the variable evaluates to "" (empty string) — the
    # fixture always sets X-Real-IP, so this degenerate bucket is
    # unreachable in practice; the single-request smoke probe also
    # carries X-Real-IP: 10.0.0.1 for completeness.
    limit_req_zone        $http_x_real_ip zone=bench_p04:1m rate=10r/s;
    limit_req_status      429;

    server {
        listen                 9080 reuseport;
        server_name            bench-nginx;

        location / {
            limit_req zone=bench_p04 burst=10 nodelay;
            error_page 429 @retry_after;

            proxy_pass http://backend_pool;
        }

        location @retry_after {
            internal;
            add_header Retry-After "1" always;
            default_type application/json;
            return 429 '{"error":"rate_limit_exceeded","limit":"10r/s","scope":"per-ip"}';
        }
    }
}
