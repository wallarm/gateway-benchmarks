# gateways/nginx/p07-resp-headers/nginx.conf
#
# Profile: p07-resp-headers.
# Canonical spec: docs/POLICIES.md § p07 — add X-Bench-Out: 1 to the
# downstream response, drop the Server header.
# Canonical fixture: fixtures/p07-resp-headers.jsonl
#
# This profile runs on OpenResty (see .env in this directory) because
# mainline nginx has no way to suppress the Server header it stamps
# on every response. The canonical idiom is `more_clear_headers`
# from the third-party ngx_headers_more module; OpenResty bundles
# that module by default.
#
# Mainline's proxy_hide_header only strips the upstream's Server;
# nginx then unconditionally adds its own. server_tokens off only
# hides the version. Only more_clear_headers actually deletes the
# header from the outgoing response. See docs/GATEWAYS.md deviations
# for the recorded rationale.
#
# OpenResty's alpine image ships without a system user named "nginx"
# (only "nobody"), so the user directive says nobody — that is the
# only docker-image-aware line in the file.

user                 nobody;
worker_processes     auto;
worker_rlimit_nofile 65535;

error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    access_log           off;
    keepalive_timeout    60s;
    keepalive_requests   100000;
    tcp_nodelay          on;
    tcp_nopush           off;
    sendfile             on;

    proxy_request_buffering   off;
    proxy_buffering           off;

    proxy_http_version 1.1;
    proxy_set_header   Connection           "";
    proxy_set_header   Host                 $http_host;
    proxy_set_header   X-Real-IP            $remote_addr;
    proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto    $scheme;

    proxy_connect_timeout   10s;
    proxy_send_timeout      10s;
    proxy_read_timeout      10s;

    upstream backend_pool {
        server backend:8080;
        keepalive         1024;
        keepalive_time    1h;
        keepalive_timeout 60s;
        keepalive_requests 100000;
    }

    default_type  application/octet-stream;

    proxy_hide_header    Server;
    server_tokens        off;

    server {
        listen                 9080 reuseport;
        server_name            bench-nginx;

        add_header           X-Bench-Out "1" always;
        more_clear_headers   "Server";

        location / {
            proxy_pass http://backend_pool;
        }
    }
}
