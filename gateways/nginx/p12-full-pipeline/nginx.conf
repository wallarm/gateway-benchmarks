# gateways/nginx/p12-full-pipeline/nginx.conf
#
# Profile: p12-full-pipeline — the chained composition of:
#     p02-jwt          → HS256 verification (access_by_lua)
#     p04-rl-static    → 1000 rps limit_req on $server_name  (preaccess)
#     p08-req-headers  → inject X-Bench-In, drop X-Forwarded-For
#     p10-req-body     → inject $.bench.injected, drop $.secret
#     p09-resp-headers → inject X-Bench-Out, drop Server
#     p11-resp-body    → inject $.bench.injected, drop $.origin
#
# Canonical spec: docs/POLICIES.md § p11
# Canonical fixture: fixtures/p12-full-pipeline.jsonl
#
# nginx phase ordering gives us the exact semantics the fixture
# expects:
#
#   PREACCESS: limit_req_zone + limit_req         ← p03
#     │   (1000 rps bucket, burst=200 nodelay, 429 over limit)
#     │
#   ACCESS   : access_by_lua_block
#     │       1. JWT verify                      ← p02
#     │       2. req-body rewrite (POST only)    ← p09
#     │
#   CONTENT  : proxy_pass → upstream
#     │       proxy_set_header X-Bench-In 1,
#     │       proxy_set_header X-Forwarded-For "" ← p07
#     │
#   header_filter_by_lua_block
#     │       clear Content-Length (body length
#     │       will change after rewrite)          ← p10
#     │
#   body_filter_by_lua_block
#             collect chunks, on EOF rewrite JSON ← p10
#
# Finally, `add_header X-Bench-Out` + `more_clear_headers "Server"`
# on the server block apply to the client-visible response        ← p08
#
# A valid token + below-limit throughput → 200 with every transform
# visible at once. A missing/expired token → 401 regardless of RL.
# A flood of valid tokens above 1000 rps → 429 from limit_req BEFORE
# the lua check (preaccess happens before access, matching both the
# fixture's burst probe and the docs/POLICIES.md ordering).

user                 nobody;
worker_processes     auto;
worker_rlimit_nofile 65535;

error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    # -------------------------------------------------------------------------
    # Uniform settings (same as p01-vanilla)
    # -------------------------------------------------------------------------
    access_log           off;
    keepalive_timeout    60s;
    keepalive_requests   100000;
    tcp_nodelay          on;
    tcp_nopush           off;
    sendfile             on;

    client_max_body_size     1m;
    client_body_buffer_size  1m;

    # Response buffering must be ON — body_filter_by_lua needs the
    # full upstream body to know when EOF has arrived before it can
    # emit the rewritten chunk.
    proxy_buffering           on;
    proxy_request_buffering   off;

    proxy_http_version 1.1;
    proxy_set_header   Connection           "";
    proxy_set_header   Host                 $http_host;

    # -------------------------------------------------------------------------
    # p07 — request-header transforms
    # -------------------------------------------------------------------------
    # Inject the bench marker the backend will observe.
    proxy_set_header   X-Bench-In           "1";
    # Drop the client-supplied X-Forwarded-For. nginx's special
    # empty-string idiom removes the header entirely from the
    # upstream request (vs. `proxy_pass_header off`, which only
    # works on a small allow-list of headers).
    proxy_set_header   X-Forwarded-For      "";

    proxy_connect_timeout   10s;
    proxy_send_timeout      10s;
    proxy_read_timeout      10s;

    upstream backend_pool {
        server backend:8080;
        keepalive         1024;
        keepalive_time    1h;
        keepalive_timeout 60s;
        keepalive_requests 100000;
    }

    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # p08 — response-header transforms (global settings)
    # -------------------------------------------------------------------------
    # Strip upstream Server header, then use more_clear_headers
    # (ngx_headers_more, bundled with OpenResty) to also wipe the
    # nginx-stamped Server header from the client-visible response.
    # server_tokens off is not sufficient on its own because nginx
    # still emits `Server: openresty` by default.
    proxy_hide_header    Server;
    server_tokens        off;

    # -------------------------------------------------------------------------
    # p03 — static service-wide rate limit
    # -------------------------------------------------------------------------
    # rate=1000r/s + burst=200 nodelay is the same shape as
    # gateways/nginx/p04-rl-static; on the fixture's 1200-request
    # burst this yields ~201 × 2xx + ~999 × 429.
    limit_req_zone       $server_name zone=bench_p12:1m rate=1000r/s;
    limit_req_status     429;

    # -------------------------------------------------------------------------
    # p02 / p09 / p10 — Lua bootstrap
    # -------------------------------------------------------------------------
    lua_package_path "/usr/local/openresty/lualib/bench/?.lua;;";

    init_by_lua_block {
        bench_jwt   = require("jwt_hs256")
        bench_body  = require("body_rewrite")
        bench_secret = "bench-jwt-hs256-secret-2026"
    }

    server {
        listen                 9080 reuseport;
        server_name            bench-nginx;

        # -------------------------------------------------------------------------
        # p08 — response-header transforms (server block)
        # -------------------------------------------------------------------------
        add_header           X-Bench-Out "1" always;
        # more_clear_headers runs after add_header / proxy_hide_header
        # and is the only directive that drops the nginx-stamped
        # `Server: openresty` header in the client-visible response.
        more_clear_headers   "Server";

        location / {
            # p03 rate limit fires here (preaccess phase) — over-limit
            # requests get 429 before we ever touch Lua. That matches
            # the fixture's burst probe, which ships a valid JWT but
            # still expects 429s from RL saturation.
            limit_req zone=bench_p12 burst=200 nodelay;

            # Flip limit_req's default 503 to 429 on the error page.
            # (error_page 429 = @retry_after works the same as in
            # gateways/nginx/p04-rl-static/nginx.conf.)
            error_page 429 = @retry_after;

            access_by_lua_block {
                -- ----- p02: JWT HS256 verification -----
                local authz = ngx.var.http_authorization
                local ok, err = bench_jwt.verify(authz, bench_secret)
                if not ok then
                    ngx.log(ngx.INFO, "jwt reject: ", err or "unknown")
                    return ngx.exit(401)
                end

                -- ----- p09: request-body rewrite -----
                -- Only rewrite bodies on methods that carry one. A
                -- GET with no body must stay a GET — set_body_data
                -- on a no-body method would fabricate framing that
                -- confuses keep-alive pools.
                local method = ngx.req.get_method()
                if method == "POST" or method == "PUT" or method == "PATCH" then
                    ngx.req.read_body()
                    local raw = ngx.req.get_body_data()
                    if raw and raw ~= "" then
                        local new = bench_body.rewrite_request(
                            raw,
                            { "bench", "injected" }, true,
                            { "secret" }
                        )
                        ngx.req.set_body_data(new)
                        ngx.req.set_header("Content-Type",
                                           "application/json")
                    end
                end
            }

            proxy_pass http://backend_pool;

            header_filter_by_lua_block {
                -- ----- p10: prep for response-body rewrite -----
                -- Clear Content-Length so the rewrite phase can emit
                -- chunked transfer encoding with the new length.
                ngx.header.content_length = nil
            }

            body_filter_by_lua_block {
                -- ----- p10: response-body rewrite -----
                local chunk = ngx.arg[1]
                local eof   = ngx.arg[2]

                local buf = ngx.ctx.bench_buf
                if not buf then
                    buf = {}
                    ngx.ctx.bench_buf = buf
                end
                if chunk and chunk ~= "" then
                    buf[#buf + 1] = chunk
                end

                if eof then
                    local raw = table.concat(buf)
                    local new = bench_body.rewrite_response_if_json(
                        raw,
                        { "bench", "injected" }, true,
                        { "origin" }
                    )
                    ngx.arg[1] = new
                    ngx.arg[2] = true
                else
                    ngx.arg[1] = nil
                end
            }
        }

        # -------------------------------------------------------------------------
        # p03 — 429 response shape (shared with p11)
        # -------------------------------------------------------------------------
        location @retry_after {
            internal;
            add_header Retry-After "1" always;
            default_type application/json;
            return 429 '{"error":"rate_limited","retry_after_seconds":1}';
        }

        # -------------------------------------------------------------------------
        # p02 — 401 response shape (shared with p02-jwt)
        # -------------------------------------------------------------------------
        error_page 401 = @unauthorized;
        location @unauthorized {
            internal;
            add_header WWW-Authenticate 'Bearer realm="bench", charset="UTF-8"' always;
            default_type application/json;
            return 401 '{"error":"unauthorized","reason":"jwt_validation_failed"}';
        }
    }

    # -------------------------------------------------------------------------
    # Phase 5 — TLS listener for s14-full-pipeline-https (opt-in)
    # -------------------------------------------------------------------------
    # Same chained policy pipeline (p02 + p04 + p07 + p08 + p09 + p10) as
    # the :9080 server block, served over TLS/1.2+TLS/1.3. server_name
    # stays `bench-nginx` so the limit_req_zone keyed on $server_name
    # is *shared* between HTTP and HTTPS — total budget = 1000 rps across
    # both protocols, which mirrors how a real production gateway would
    # account for the same logical service regardless of transport.
    #
    # The init_by_lua_block above runs once per worker and binds
    # bench_jwt / bench_body / bench_secret in the worker's global
    # state, so the access_by_lua_block / header_filter_by_lua_block /
    # body_filter_by_lua_block hooks below resolve them without
    # re-requiring.
    server {
        listen                    9443 ssl reuseport;
        server_name               bench-nginx;

        ssl_certificate           /etc/nginx/tls/bench.crt;
        ssl_certificate_key       /etc/nginx/tls/bench.key;
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;

        ssl_session_cache         shared:SSL_p12:10m;
        ssl_session_timeout       10m;

        # p08 — response-header transforms (mirror the :9080 block)
        add_header           X-Bench-Out "1" always;
        more_clear_headers   "Server";

        location / {
            limit_req zone=bench_p12 burst=200 nodelay;
            error_page 429 = @retry_after_tls;

            access_by_lua_block {
                local authz = ngx.var.http_authorization
                local ok, err = bench_jwt.verify(authz, bench_secret)
                if not ok then
                    ngx.log(ngx.INFO, "jwt reject: ", err or "unknown")
                    return ngx.exit(401)
                end

                local method = ngx.req.get_method()
                if method == "POST" or method == "PUT" or method == "PATCH" then
                    ngx.req.read_body()
                    local raw = ngx.req.get_body_data()
                    if raw and raw ~= "" then
                        local new = bench_body.rewrite_request(
                            raw,
                            { "bench", "injected" }, true,
                            { "secret" }
                        )
                        ngx.req.set_body_data(new)
                        ngx.req.set_header("Content-Type",
                                           "application/json")
                    end
                end
            }

            proxy_pass http://backend_pool;

            header_filter_by_lua_block {
                ngx.header.content_length = nil
            }

            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local eof   = ngx.arg[2]

                local buf = ngx.ctx.bench_buf
                if not buf then
                    buf = {}
                    ngx.ctx.bench_buf = buf
                end
                if chunk and chunk ~= "" then
                    buf[#buf + 1] = chunk
                end

                if eof then
                    local raw = table.concat(buf)
                    local new = bench_body.rewrite_response_if_json(
                        raw,
                        { "bench", "injected" }, true,
                        { "origin" }
                    )
                    ngx.arg[1] = new
                    ngx.arg[2] = true
                else
                    ngx.arg[1] = nil
                end
            }
        }

        location @retry_after_tls {
            internal;
            add_header Retry-After "1" always;
            default_type application/json;
            return 429 '{"error":"rate_limited","retry_after_seconds":1}';
        }

        error_page 401 = @unauthorized_tls;
        location @unauthorized_tls {
            internal;
            add_header WWW-Authenticate 'Bearer realm="bench", charset="UTF-8"' always;
            default_type application/json;
            return 401 '{"error":"unauthorized","reason":"jwt_validation_failed"}';
        }
    }
}
