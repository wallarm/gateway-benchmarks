# gateways/envoy/docker-compose.yaml
#
# Single-gateway stack used by `make parity-gateway` for parity attestation.
# Same port contract as every other gateway under `gateways/<gw>/`:
#
#     loadgen (host)  →  envoy :9080  →  backend :8080
#
# Envoy has a read-only admin API (by convention on :9901). We *do*
# publish it because parity-gateway.sh's generic wait loop is happy
# with either port answering and because it is useful for debugging
# live runs (`curl :9901/stats` / `/clusters`). No profile ever
# mutates the configuration through it — every profile ships a full
# static bootstrap file mounted read-only at /etc/envoy/envoy.yaml
# and reloads by container restart.
#
# The policy profile is picked by the GATEWAY_PROFILE env var (default
# `p01-vanilla`). Each profile directory must contain:
#
#   envoy.yaml   - full static bootstrap (listener + clusters + filters)
#   setup.sh     - post-up smoke check (envoy is ready at container start)
#   NOTES.md     - profile-specific notes / deviations
#
# Default image is pinned by digest for reproducibility; refresh with:
#   docker pull envoyproxy/envoy:distroless-v1.32.6 && \
#     docker image inspect envoyproxy/envoy:distroless-v1.32.6 \
#       --format '{{index .RepoDigests 0}}'
#
# The GATEWAY_IMAGE override hook is wired in (per the wallarm/nginx
# pattern) so a future profile that needs a non-distroless image — or
# an unreleased build — can swap it via `gateways/envoy/<profile>/.env`
# without touching this file.

name: ${BENCH_COMPOSE_PROJECT:-gateway-benchmarks-envoy}

services:
  backend:
    image: gateway-benchmarks/backend:v2.22.1
    container_name: ${BENCH_CONTAINER_PREFIX:-gwb-envoy}-backend
    restart: "no"
    # Backend listens on :8080 inside the container. We do NOT publish
    # it on the host — only the gateway needs to talk to it, over the
    # private `bench-net` bridge. Add `- "8088:8080"` temporarily if
    # you want to probe it from the host.
    networks:
      bench-net:
        aliases: [backend]

  gateway:
    image: ${GATEWAY_IMAGE:-envoyproxy/envoy:distroless-v1.32.6@sha256:569ad5b2503aca24c9f6af48c47449200afdb761bb4d1a021741d6d6692acf56}
    container_name: ${BENCH_CONTAINER_PREFIX:-gwb-envoy}
    restart: "no"
    depends_on:
      - backend
    # Distroless envoy entrypoint is `envoy` itself; we pass the
    # bootstrap file and tune log level for a quiet hot path. Component
    # log overrides keep filter-level traces silent while the
    # orchestrator still sees real warnings.
    #
    # `--concurrency 0` means "auto-detect": envoy spawns one worker
    # thread per hardware thread visible to the container (same
    # contract as nginx `worker_processes auto`, kong/apisix openresty
    # defaults). This is the load-phase posture — other gateways all
    # run multi-worker, so pinning envoy to a single worker would
    # kneecap its throughput numbers on anything other than a 1-vCPU
    # host.
    #
    # Rate-limit semantics are INDEPENDENT of worker count: envoy's
    # local_ratelimit filter uses a SHARED token bucket across every
    # worker in the process (v1.17+, v1.32 proto doc: "By default the
    # token bucket is shared across all workers, thus the rate limits
    # are applied per Envoy process"). We verified empirically on p03
    # (1200-request burst on max_tokens=500 with --concurrency 1 vs
    # --concurrency 2 both yielded ≈555 passes) — buckets are NOT
    # multiplied by worker count. Every RL profile (p04/p05/p06/p07)
    # sizes its buckets at the canonical rate verbatim and survives
    # the change to auto-concurrency unchanged.
    command:
      - "-c"
      - "/etc/envoy/envoy.yaml"
      - "--log-level"
      - "warn"
      - "--component-log-level"
      - "upstream:warn,connection:error,http:warn"
      - "--concurrency"
      - "0"
    # envoy.yaml is mounted read-only per profile. The mount target
    # is always /etc/envoy/envoy.yaml; the source is picked by the
    # `GATEWAY_PROFILE` env var (default `p01-vanilla`) — the
    # scripts/parity-gateway.sh harness sets it per profile.
    #
    # We bind-mount rather than use `configs:` because compose's
    # named configs are cached across `compose down -v` cycles; an
    # edit to the underlying file is only re-materialised when the
    # config *name* changes, which means tuning iterations against
    # the same profile silently reuse a stale file. Bind-mounts read
    # fresh on every container start, which is what we want.
    #
    # A previous iteration (see git log) reversed this decision after
    # chasing a phantom "bind-mount staleness" symptom. That symptom
    # turned out to be `max_connection_duration: 0s` in the HCM's
    # `common_http_protocol_options`, which closes every connection
    # at t=0 and hides config changes behind a wall of
    # `curl: (52) Empty reply from server`. That field is now UNSET
    # across every envoy profile (see the inline comment in each
    # profile's envoy.yaml), so bind-mount is the right tool again.
    volumes:
      - ./${GATEWAY_PROFILE:-p01-vanilla}/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./_shared/lualib:/etc/envoy/lualib:ro
      # Phase 5 — bench TLS reference material. Read by p01-vanilla
      # and p12-full-pipeline envoy.yaml when their listener_tls
      # transport_socket points at /etc/envoy/tls/. Inert on every
      # other profile.
      - ../_reference/tls:/etc/envoy/tls:ro
    ports:
      - "${GATEWAY_HTTP_PORT:-9080}:9080"   # data plane (parity-gateway target)
      - "${GATEWAY_HTTPS_PORT:-9443}:9443"  # Phase 5 TLS data plane (s13/s14)
      - "${GATEWAY_ENVOY_ADMIN_PORT:-9901}:9901"  # admin (read-only: /stats, /clusters, /config_dump)
    # Envoy drains gracefully on SIGTERM. A 5 s stop-grace-period keeps
    # `docker compose down` snappy during the parity sweeps.
    stop_grace_period: 5s
    networks:
      bench-net:
        aliases: [gateway]

networks:
  bench-net:
    driver: bridge
