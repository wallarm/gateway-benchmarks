# gateways/nginx/p05-rl-endpoint/nginx.conf
#
# Profile: p05-rl-endpoint (per-endpoint static rate limit).
# Canonical spec:    docs/POLICIES.md § p04
# Canonical fixture: fixtures/p05-rl-endpoint.jsonl
#
# Limit:      100 req/s, rolling 1 s window.
# Scope:      ONE specific client-visible path (`/anything/limited`).
# Free path:  `/anything/free` must stay unrestricted — same listener,
#             same worker pool, same upstream, same everything else.
# Over-limit: HTTP 429 with `Retry-After: 1`.
#
# nginx realises per-endpoint scoping via the `location` block
# primitive: every `limit_req` directive is lexically scoped to its
# enclosing `location`, and nginx picks the most specific location
# for each request by the documented ordering (`=`, `^~`, regex,
# longest-prefix, then the catch-all `/`). By placing
# `limit_req` only inside the `/anything/limited` location and not
# inside the catch-all `/`, requests to `/anything/free` bypass the
# leaky bucket entirely — no decrement, no hash-table lookup, no
# condition under which a misconfigured gateway could leak the
# policy onto a neighbouring route.
#
# Bucket shape: `rate=100r/s` + `burst=100 nodelay`.
#   * `burst=100` absorbs the initial `(1 + burst) = 101` requests
#     immediately and then rejects anything else with 429 until the
#     leak (100 rps steady) drains the bucket. Under the fixture's
#     ASAP 1200-request burst this yields ~110 × 2xx + ~1090 × 429 —
#     far above the `status_429_min=150 ± 50` threshold.
#   * `nodelay` is critical: without it nginx DELAYS excess requests
#     rather than rejecting them, so the fixture would not observe
#     429s but `other` errors from upstream timeout.
#
# Everything else (uniform settings, upstream pool, keep-alive) is
# identical to p01/p03/p05/p06 so the cells stay apples-to-apples
# on every non-RL axis.

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    # -------------------------------------------------------------------------
    # Uniform settings (same as p01/p03/p05/p06)
    # -------------------------------------------------------------------------
    access_log           off;
    keepalive_timeout    60s;
    keepalive_requests   100000;
    tcp_nodelay          on;
    tcp_nopush           off;
    sendfile             on;

    proxy_request_buffering   off;
    proxy_buffering           off;

    proxy_http_version 1.1;
    proxy_set_header   Connection           "";
    proxy_set_header   Host                 $http_host;
    proxy_set_header   X-Real-IP            $remote_addr;
    proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto    $scheme;

    proxy_connect_timeout   10s;
    proxy_send_timeout      10s;
    proxy_read_timeout      10s;

    upstream backend_pool {
        server backend:8080;
        keepalive         1024;
        keepalive_time    1h;
        keepalive_timeout 60s;
        keepalive_requests 100000;
    }

    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # p04 — per-endpoint static rate limit (100 rps on one path)
    # -------------------------------------------------------------------------
    # Shared memory zone: 1 MB ≈ 16 k keys, we only need exactly one
    # (`$server_name` is constant on every request landing in this
    # server block). The "per-endpoint" semantics comes from the fact
    # that `limit_req` is referenced ONLY inside the
    # `/anything/limited` location — the catch-all `/` does not
    # touch the bucket.
    limit_req_zone        $server_name zone=bench_p05:1m rate=100r/s;
    limit_req_status      429;

    server {
        listen                 9080 reuseport;
        server_name            bench-nginx;

        # The rate-limited endpoint. `location /anything/limited` is
        # a prefix match (nginx's default for path-style locations);
        # it matches `/anything/limited`, `/anything/limited/foo`,
        # etc. — same shape as envoy's `match: { prefix: ... }`.
        location /anything/limited {
            limit_req zone=bench_p05 burst=100 nodelay;
            error_page 429 @retry_after;

            proxy_pass http://backend_pool;
        }

        # Catch-all for every other path — `/anything/free` lands
        # here and must NEVER be rate-limited. The absence of a
        # `limit_req` directive is load-bearing: a single misplaced
        # copy of it inside this block would fail the fixture's
        # `status_429_max: 0` assertion on the free-endpoint burst.
        location / {
            proxy_pass http://backend_pool;
        }

        # Synthesise the canonical `Retry-After: 1` header and a
        # stable body for every 429 produced by limit_req. The
        # `internal;` directive keeps this location reachable only
        # via the error_page redirect — clients cannot hit it
        # directly.
        location @retry_after {
            internal;
            add_header Retry-After "1" always;
            default_type application/json;
            return 429 '{"error":"rate_limit_exceeded","limit":"100r/s","scope":"endpoint:/anything/limited"}';
        }
    }
}
