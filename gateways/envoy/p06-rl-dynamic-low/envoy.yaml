# gateways/envoy/p06-rl-dynamic-low/envoy.yaml
#
# Profile: p06-rl-dynamic-low (per-client-IP rate limit, low cardinality).
# Canonical spec:     docs/POLICIES.md § p05
# Canonical fixture:  fixtures/p06-rl-dynamic-low.jsonl
#
# Limit:        10 req/s per client IP
# Key source:   X-Real-IP header
# IP pool:      100 distinct IPs per POLICIES.md (fixture exercises 10)
# Over-limit:   HTTP 429 with Retry-After: 1
#
# Envoy realises per-key rate limiting via
# `envoy.filters.http.local_ratelimit` with:
#
#   * `rate_limits.actions[0] = request_headers{x-real-ip -> client_ip}`
#     which generates a descriptor entry `{client_ip: <value>}` for
#     every request that carries an X-Real-IP header.
#   * `descriptors[]` that lists one entry per fixture IP. A match
#     consumes that descriptor's private token bucket and skips the
#     default bucket.
#   * `always_consume_default_token_bucket: false` so a matched
#     descriptor does not *also* drain the global safety-net bucket.
#
# ENUMERATED DESCRIPTORS — DEVIATION FROM NGINX / WALLARM SHAPE
# --------------------------------------------------------------
# Envoy v1.32's local_ratelimit requires VERBATIM descriptor matches
# ("The descriptors must match verbatim for rate limiting to apply.
# There is no partial match by a subset of descriptor entries in the
# current implementation." — v1.32.0 proto docs). Blank-value wildcard
# descriptors (the idiomatic "one descriptor per unique header value")
# landed in envoy v1.33 via
# https://github.com/envoyproxy/envoy/pull/36623. Our pinned column
# image is `envoyproxy/envoy:distroless-v1.32.6`, one minor version
# below that change, so this profile enumerates every IP the fixture
# touches (10.0.0.1 … 10.0.0.10).
#
# For the real-world 100-IP pool mandated by POLICIES.md, or the
# 50 000-IP pool of p06, either:
#   (a) bump the column to ≥ v1.33 and collapse the descriptor list
#       into a single wildcard-value entry, or
#   (b) pair local_ratelimit with a global RLS keyed on X-Real-IP.
# Tracked in `docs/GATEWAYS.md § Deviations`.
#
# THREAD MODEL — BUCKET IS SHARED ACROSS WORKERS
# ----------------------------------------------
# envoy.filters.http.local_ratelimit uses a SHARED token bucket by
# default across every worker thread in the process, one bucket per
# descriptor instance. Per v1.32 proto docs:
#
#   > By default the token bucket is shared across all workers, thus
#   > the rate limits are applied per Envoy process.
#
# We verified this empirically against p03 (see that profile's header
# comment for the numbers). The per-descriptor buckets below are
# therefore sized at the canonical per-IP rate with no per-worker
# multiplication — `max_tokens: 10, tokens_per_fill: 10,
# fill_interval: 1s` equals exactly 10 rps per IP, matching
# POLICIES.md § p05.
#
# Everything outside the filter (listener, cluster, uniform settings)
# is identical to p01-vanilla so the cells stay apples-to-apples on
# every non-RL axis.

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9080
      reuse_port: true
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: HTTP1
                common_http_protocol_options:
                  idle_timeout: 60s
                  # See p01-vanilla/envoy.yaml: leaving
                  # max_connection_duration UNSET (rather than `0s`) is the
                  # "no maximum" setting — `0s` would close every connection
                  # at t=0 and every request would fail mid-response.
                  max_requests_per_connection: 100000
                stream_idle_timeout: 60s
                request_timeout: 10s
                normalize_path: false
                merge_slashes: false
                server_header_transformation: OVERWRITE
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_vh
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 10s
                http_filters:
                  # -----------------------------------------------------------
                  # p05 — per-IP rate limit (10 rps per X-Real-IP)
                  # -----------------------------------------------------------
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: http_local_rl_p05
                      # Safety-net default bucket for requests that
                      # produce no descriptor (e.g. missing X-Real-IP,
                      # or a value outside the enumerated list). Sized
                      # orders of magnitude above the 500-800 rps
                      # ceiling observed for envoy on Docker Desktop
                      # so it never trips during parity — any request
                      # through this path is treated as "allowed".
                      token_bucket:
                        max_tokens: 100000
                        tokens_per_fill: 100000
                        fill_interval: 1s
                      # Without this flag, a request that hits a
                      # per-IP descriptor would *also* drain a token
                      # from the default bucket, silently coupling
                      # distinct IPs through the safety-net pool. We
                      # want per-IP buckets to be fully isolated.
                      always_consume_default_token_bucket: false
                      # The `rate_limits` stanza tells envoy how to
                      # build a descriptor from each incoming request.
                      # One action, one header, one descriptor entry:
                      # `{key: client_ip, value: <X-Real-IP value>}`.
                      # envoy normalises header names to lower-case
                      # internally, so `x-real-ip` matches `X-Real-IP`.
                      rate_limits:
                        - actions:
                            - request_headers:
                                header_name: x-real-ip
                                descriptor_key: client_ip
                      # Enumerated per-IP descriptors (see file header
                      # for why we enumerate rather than use a wildcard).
                      # Every entry gets its own shared-across-workers
                      # token bucket; a request whose descriptor matches
                      # consumes *only* that bucket.
                      #
                      # max_tokens=10, tokens_per_fill=10, fill_interval=1s
                      #  -> exactly 10 rps per IP, 10-request burst
                      #  -> matches POLICIES.md § p05 1:1
                      #  -> matches nginx/p05 shape
                      #     (rate=10r/s, burst=10 nodelay)
                      descriptors:
                        - entries: [{ key: client_ip, value: "10.0.0.1" }]
                          token_bucket: { max_tokens: 10, tokens_per_fill: 10, fill_interval: 1s }
                        - entries: [{ key: client_ip, value: "10.0.0.2" }]
                          token_bucket: { max_tokens: 10, tokens_per_fill: 10, fill_interval: 1s }
                        - entries: [{ key: client_ip, value: "10.0.0.3" }]
                          token_bucket: { max_tokens: 10, tokens_per_fill: 10, fill_interval: 1s }
                        - entries: [{ key: client_ip, value: "10.0.0.4" }]
                          token_bucket: { max_tokens: 10, tokens_per_fill: 10, fill_interval: 1s }
                        - entries: [{ key: client_ip, value: "10.0.0.5" }]
                          token_bucket: { max_tokens: 10, tokens_per_fill: 10, fill_interval: 1s }
                        - entries: [{ key: client_ip, value: "10.0.0.6" }]
                          token_bucket: { max_tokens: 10, tokens_per_fill: 10, fill_interval: 1s }
                        - entries: [{ key: client_ip, value: "10.0.0.7" }]
                          token_bucket: { max_tokens: 10, tokens_per_fill: 10, fill_interval: 1s }
                        - entries: [{ key: client_ip, value: "10.0.0.8" }]
                          token_bucket: { max_tokens: 10, tokens_per_fill: 10, fill_interval: 1s }
                        - entries: [{ key: client_ip, value: "10.0.0.9" }]
                          token_bucket: { max_tokens: 10, tokens_per_fill: 10, fill_interval: 1s }
                        - entries: [{ key: client_ip, value: "10.0.0.10" }]
                          token_bucket: { max_tokens: 10, tokens_per_fill: 10, fill_interval: 1s }
                      filter_enabled:
                        runtime_key: local_rate_limit_enabled
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      filter_enforced:
                        runtime_key: local_rate_limit_enforced
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      status:
                        code: TooManyRequests
                      response_headers_to_add:
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: retry-after
                            value: "1"
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: backend_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 10s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 60s
            max_requests_per_connection: 100000
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
          keepalive_interval: 10
          keepalive_probes: 3
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 8080
