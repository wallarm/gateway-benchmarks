# gateways/nginx/p04-rl-static/nginx.conf
#
# Profile: p04-rl-static (static service-wide rate limit, 1000 rps,
# rolling 1 s window).
# Canonical spec: docs/POLICIES.md § p03
# Canonical fixture: fixtures/p04-rl-static.jsonl
#
# nginx realises "1000 rps service-wide, rolling 1s" via the
# `ngx_http_limit_req_module` leaky-bucket implementation:
#   * rate=1000r/s  → one token per millisecond (nginx's internal granularity)
#   * key=$server_name → a single constant ⇒ one bucket for every request
#                        on this server (the "service-wide" semantics)
#   * burst=200 nodelay → absorb short-lived overshoots without 503s,
#                        reject the rest *immediately* with 429 (no queuing)
#   * limit_req_status 429 → default is 503; the fixture asserts 429
#   * error_page 429 @retry_after → the only way to stamp `Retry-After: 1`
#                        on the 429 response that `docs/POLICIES.md` mandates
#
# Everything else is inherited verbatim from p01-vanilla so the two
# cells are apples-to-apples on every non-RL axis (uniform settings
# per docs/GATEWAYS.md).

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    # -------------------------------------------------------------------------
    # Uniform settings (same as p01-vanilla)
    # -------------------------------------------------------------------------
    access_log           off;
    keepalive_timeout    60s;
    keepalive_requests   100000;
    tcp_nodelay          on;
    tcp_nopush           off;
    sendfile             on;

    proxy_request_buffering   off;
    proxy_buffering           off;

    proxy_http_version 1.1;
    proxy_set_header   Connection           "";
    proxy_set_header   Host                 $http_host;
    proxy_set_header   X-Real-IP            $remote_addr;
    proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto    $scheme;

    proxy_connect_timeout   10s;
    proxy_send_timeout      10s;
    proxy_read_timeout      10s;

    upstream backend_pool {
        server backend:8080;
        keepalive         1024;
        keepalive_time    1h;
        keepalive_timeout 60s;
        keepalive_requests 100000;
    }

    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # p03 — static service-wide rate limit
    # -------------------------------------------------------------------------
    # Shared memory zone: 1 MB ≈ 16 k keys, we need exactly 1.
    # The key `$server_name` is the same string on every request, so
    # all traffic collapses into one bucket.
    limit_req_zone        $server_name zone=bench_p04:1m rate=1000r/s;

    # Make 429 (not the default 503) the over-limit status code.
    limit_req_status      429;

    # Leaky-bucket buffer sizing:
    #   burst=200, nodelay
    # With nodelay, nginx serves the first (1 + burst) = 201 requests
    # immediately, then rejects anything else with 429 until the
    # leak (1 request / ms) drains the bucket. Under the fixture's
    # ASAP 1200-request burst this yields ~201 × 2xx + ~999 × 429 —
    # well above the fixture's `status_429_min=150 ± 50` threshold,
    # and close in shape to the paced 1000 rps limit.
    #
    # docs/POLICIES.md mandates "429 with Retry-After: 1" — nginx does
    # not stamp Retry-After on limit_req's 429 automatically, so we
    # bounce into a named location via error_page.

    server {
        listen                 9080 reuseport;
        server_name            bench-nginx;

        location / {
            limit_req zone=bench_p04 burst=200 nodelay;
            error_page 429 @retry_after;

            proxy_pass http://backend_pool;
        }

        # Synthesise the `Retry-After: 1` header and a canonical body
        # for every 429 produced by limit_req. The `internal;`
        # directive keeps this location reachable only via the
        # error_page redirect — clients cannot hit it directly.
        location @retry_after {
            internal;
            add_header Retry-After "1" always;
            default_type application/json;
            return 429 '{"error":"rate_limit_exceeded","limit":"1000r/s"}';
        }
    }
}
