# gateways/envoy/p10-req-body/envoy.yaml
#
# Profile: p10-req-body.
# Canonical spec: docs/POLICIES.md § p09 — rewrite the request body
#   * add    $.bench.injected = true
#   * remove $.secret
# Canonical fixture: fixtures/p10-req-body.jsonl
#
# Envoy implementation:
#
#   1. `envoy.filters.http.buffer` — buffers the full request body
#      BEFORE the Lua filter runs. Without this, `request_handle:body()`
#      in the Lua callback returns nil (envoy streams by default).
#      `max_request_bytes: 1048576` matches nginx's
#      `client_max_body_size 1m;` on the sibling column.
#
#   2. `envoy.filters.http.lua` — runs `envoy_on_request`, which
#      reads the buffered body, parses it as JSON via `json.lua`,
#      rewrites via `body_rewrite.lua`, then calls
#      `request_handle:body():setBytes(new)`. Envoy then patches
#      Content-Length on the upstream-bound request automatically
#      (same invariant the nginx column holds via
#      `ngx.req.set_body_data`).
#
#   3. `envoy.filters.http.router` — terminal filter. The rewritten
#      body flows upstream.
#
# Lua source layout:
#   * `_shared/lualib/base64.lua`
#   * `_shared/lualib/sha256.lua`    (unused here, loaded for p02/p11)
#   * `_shared/lualib/json.lua`
#   * `_shared/lualib/body_rewrite.lua`
# Mounted at `/etc/envoy/lualib/` by `docker-compose.yaml`.
# The inline code adjusts `package.path` before `require`.
#
# The bench value + drop key pair matches the fixture exactly.
# Content-Type is forced to `application/json` on the upstream-bound
# request; the fixture always sends JSON anyway and this guarantees
# go-httpbin echoes the body under `.json` in its response.

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9080
      reuse_port: true
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: HTTP1
                common_http_protocol_options:
                  idle_timeout: 60s
                  # See p01-vanilla/envoy.yaml: max_connection_duration
                  # MUST stay UNSET or every request fails mid-response.
                  max_requests_per_connection: 100000
                stream_idle_timeout: 60s
                request_timeout: 10s
                normalize_path: false
                merge_slashes: false
                server_header_transformation: OVERWRITE
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_vh
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 10s
                http_filters:
                  # ---------------------------------------------------
                  # 1. Buffer — ensure the entire request body is in
                  #    memory before the Lua filter's envoy_on_request
                  #    callback runs. Without this, body() returns nil
                  #    and the rewrite silently no-ops.
                  # ---------------------------------------------------
                  - name: envoy.filters.http.buffer
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.buffer.v3.Buffer
                      # 1 MiB matches nginx's `client_max_body_size 1m;`
                      # on the sibling column; the canonical fixture
                      # never exceeds a few hundred bytes.
                      max_request_bytes: 1048576
                  # ---------------------------------------------------
                  # 2. Lua — request-body rewrite.
                  # ---------------------------------------------------
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          -- /etc/envoy/lualib/ is mounted read-only by
                          -- docker-compose and contains our pure-Lua
                          -- helpers (base64, sha256, json, jwt_hs256,
                          -- body_rewrite). Prepend it to package.path
                          -- exactly once, at filter load time.
                          package.path = "/etc/envoy/lualib/?.lua;" ..
                                         (package.path or "")
                          local body = require("body_rewrite")

                          function envoy_on_request(req)
                              -- With the buffer filter above, body()
                              -- returns the full request buffer. On a
                              -- GET / HEAD with no body it returns nil;
                              -- treat as empty and let body_rewrite
                              -- coerce to {}.
                              local buf = req:body()
                              local raw = ""
                              if buf and buf:length() > 0 then
                                  raw = buf:getBytes(0, buf:length())
                              end

                              local new, err = body.rewrite_request(
                                  raw,
                                  {"bench", "injected"}, true,
                                  {"secret"}
                              )
                              if not new then
                                  req:logErr("p09 rewrite failed: " ..
                                             tostring(err))
                                  return
                              end

                              -- setBytes replaces the buffered request
                              -- body; envoy recomputes Content-Length
                              -- on the upstream-bound request.
                              if buf then
                                  buf:setBytes(new)
                              end
                              -- Force JSON content-type so go-httpbin
                              -- echoes the body under $.json.
                              req:headers():replace("content-type",
                                                    "application/json")
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: backend_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 10s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 60s
            max_requests_per_connection: 100000
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
          keepalive_interval: 10
          keepalive_probes: 3
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 8080
