# gateways/envoy/p02-jwt/envoy.yaml
#
# Profile: p02-jwt.
# Canonical spec: docs/POLICIES.md § p02 — HS256 JWT validation with
#   shared secret `bench-jwt-hs256-secret-2026`. Reject with 401 on:
#     * missing Authorization header
#     * non-Bearer scheme
#     * malformed / garbage token
#     * expired token (exp < now)
#     * wrong-secret signature
#   Allow valid HS256 tokens through.
# Canonical fixture: fixtures/p02-jwt.jsonl
#
# Implementation: `envoy.filters.http.lua` + our own HS256 verifier.
# Envoy's native `envoy.filters.http.jwt_authn` supports only
# asymmetric algorithms (RS / ES / PS / EdDSA) — HS256 is deliberately
# not in its algorithm list because the filter was designed for the
# OIDC / JWKS world where symmetric keys are discouraged. The
# canonical benchmark IS HS256, so we drop down to the Lua filter
# and verify the token ourselves.
#
# The verifier lives in `_shared/lualib/jwt_hs256.lua` and composes
# three helper modules:
#
#   * `_shared/lualib/base64.lua`   — RFC 4648 §4 / §5 codec
#   * `_shared/lualib/sha256.lua`   — FIPS 180-4 SHA-256 + RFC 2104 HMAC
#   * `_shared/lualib/json.lua`     — minimal pure-Lua JSON decoder
#
# All four files are ~600 lines combined, audit-friendly, and have no
# dependencies beyond LuaJIT's `bit` module and `os.time()`.
#
# Why not native jwt_authn with a "faked" RSA key?
# ------------------------------------------------
# Several community posts suggest wrapping the HS256 secret as an
# oct-format JWK, but envoy's jwt_authn JWK parser rejects `kty: oct`
# outright (see envoyproxy/envoy#16081). The only native route would
# be to upgrade the canonical secret to RS256 — which the benchmark
# explicitly does NOT do, because `p02-jwt` is precisely the
# "HS256 shared secret" cell. The `p03-jwks-rs256-basic`
# scenario covers the RS256/JWKS axis separately via native
# jwt_authn.
#
# Rejection shape
# ---------------
# On a failed verification we call:
#
#   req:respond({
#       [":status"] = "401",
#       ["content-type"] = "application/json",
#       ["www-authenticate"] = 'Bearer realm="bench", charset="UTF-8"',
#   }, '{"error":"unauthorized","reason":"jwt_validation_failed"}')
#
# This short-circuits the filter chain so the request never reaches
# the router; the response is crafted entirely inside the Lua
# filter. Matches the nginx column's `error_page 401 = @unauthorized`
# body shape 1:1. The `www-authenticate` header is RFC 6750 §3
# compliant and mirrors the sibling column.

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9080
      reuse_port: true
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: HTTP1
                common_http_protocol_options:
                  idle_timeout: 60s
                  # See p01-vanilla/envoy.yaml: max_connection_duration
                  # MUST stay UNSET or every request fails mid-response.
                  max_requests_per_connection: 100000
                stream_idle_timeout: 60s
                request_timeout: 10s
                normalize_path: false
                merge_slashes: false
                server_header_transformation: OVERWRITE
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_vh
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 10s
                http_filters:
                  # ---------------------------------------------------
                  # Lua — HS256 JWT verification, 401 on fail.
                  # ---------------------------------------------------
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          package.path = "/etc/envoy/lualib/?.lua;" ..
                                         (package.path or "")
                          local jwt = require("jwt_hs256")

                          -- Shared secret pinned in
                          -- docs/POLICIES.md § p02. Public by design:
                          -- benchmark-only credential, never used in
                          -- production. Same value as nginx/p02-jwt's
                          -- init_by_lua_block binding.
                          local BENCH_SECRET =
                              "bench-jwt-hs256-secret-2026"

                          -- 401 envelope matches the nginx column's
                          -- error_page @unauthorized content. We
                          -- stamp www-authenticate per RFC 6750 §3
                          -- even though no fixture probe asserts it;
                          -- a production-shaped response is the
                          -- correct default.
                          local REJ_HEADERS = {
                              [":status"] = "401",
                              ["content-type"] = "application/json",
                              ["www-authenticate"] =
                                  'Bearer realm="bench", charset="UTF-8"',
                          }
                          local REJ_BODY =
                              '{"error":"unauthorized",' ..
                              '"reason":"jwt_validation_failed"}'

                          function envoy_on_request(req)
                              local authz =
                                  req:headers():get("authorization")
                              local ok, err =
                                  jwt.verify(authz, BENCH_SECRET)
                              if not ok then
                                  -- Envoy's Lua filter discourages
                                  -- chatty info-level logging of
                                  -- per-request rejections (the
                                  -- fixture deliberately exercises
                                  -- 5/6 failure paths). Only log at
                                  -- debug — a real deployment would
                                  -- route the counter via
                                  -- stats_prefix instead.
                                  req:respond(REJ_HEADERS, REJ_BODY)
                              end
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: backend_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 10s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 60s
            max_requests_per_connection: 100000
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
          keepalive_interval: 10
          keepalive_probes: 3
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 8080
