# gateways/nginx/p08-req-body/nginx.conf
#
# Profile: p08-req-body.
# Canonical spec: docs/POLICIES.md § p08 — rewrite the request body
#   * add    $.bench.injected = true
#   * remove $.secret
# Canonical fixture: fixtures/p08-req-body.jsonl
#
# Implementation: OpenResty, using `access_by_lua_block` +
# `ngx.req.read_body` + `ngx.req.set_body_data`. cjson.safe parses
# the incoming JSON, body_rewrite.lua mutates it, and
# set_body_data() automatically recomputes Content-Length on the
# upstream-bound request so the backend never sees a stale length.
#
# The wallarm counterpart does the same transform via `lua_runner`
# on `request_flow` — identical shape, identical cjson primitive,
# identical Content-Length invariant. See
# gateways/wallarm/p08-req-body/NOTES.md for parity notes.

user                 nobody;
worker_processes     auto;
worker_rlimit_nofile 65535;

error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    access_log           off;
    keepalive_timeout    60s;
    keepalive_requests   100000;
    tcp_nodelay          on;
    tcp_nopush           off;
    sendfile             on;

    # Body rewrite needs the full body in memory before we can parse
    # JSON, so buffering is ON (defaults to ON on OpenResty anyway
    # when `ngx.req.read_body()` is called, but we spell it out).
    # Limit is generous — policy profiles ship with bodies < 4 KiB.
    client_max_body_size     1m;
    client_body_buffer_size  1m;

    # Response-side buffering is untouched; we only rewrite requests.
    proxy_buffering           off;

    proxy_http_version 1.1;
    proxy_set_header   Connection           "";
    proxy_set_header   Host                 $http_host;
    proxy_set_header   X-Real-IP            $remote_addr;
    proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto    $scheme;

    proxy_connect_timeout   10s;
    proxy_send_timeout      10s;
    proxy_read_timeout      10s;

    upstream backend_pool {
        server backend:8080;
        keepalive         1024;
        keepalive_time    1h;
        keepalive_timeout 60s;
        keepalive_requests 100000;
    }

    default_type  application/octet-stream;

    lua_package_path "/usr/local/openresty/lualib/bench/?.lua;;";

    init_by_lua_block {
        bench_body = require("body_rewrite")
    }

    server {
        listen                 9080 reuseport;
        server_name            bench-nginx;

        location / {
            # Read the full client body into memory. With
            # `client_body_buffer_size 1m` and `client_max_body_size 1m`
            # set above, this stays in RAM and never spools to disk.
            access_by_lua_block {
                ngx.req.read_body()
                local raw = ngx.req.get_body_data()

                -- Probe 2 in fixtures/p08-req-body.jsonl sends {}
                -- (2 bytes), but if the client sent an empty body at
                -- all, get_body_data() returns nil; normalise to "".
                local new_body = bench_body.rewrite_request(
                    raw or "",
                    { "bench", "injected" }, true,
                    { "secret" }
                )

                -- set_body_data() also patches Content-Length so the
                -- upstream-bound request carries the new size. This is
                -- the nginx analogue of wallarm's
                -- `ctx.request.headers["content-length"] = tostring(#new_body)`.
                ngx.req.set_body_data(new_body)

                -- Ensure the upstream sees a JSON content-type even
                -- if the client forgot one — cjson always emits JSON.
                ngx.req.set_header("Content-Type", "application/json")
            }

            proxy_pass http://backend_pool;
        }
    }
}
