# gateways/nginx/p02-jwt/nginx.conf
#
# Profile: p02-jwt.
# Canonical spec: docs/POLICIES.md § p02 — HS256 JWT validation with
#   shared secret `bench-jwt-hs256-secret-2026`. Reject with 401 on:
#     * missing Authorization header
#     * non-Bearer scheme
#     * malformed / garbage token
#     * expired token (exp < now)
#     * wrong-secret signature
# Canonical fixture: fixtures/p02-jwt.jsonl
#
# Implementation: OpenResty with a ~60-line pure-Lua HS256 verifier
# at _shared/lualib/jwt_hs256.lua. We deliberately do NOT depend on
# lua-resty-jwt / lua-resty-hmac — both would require a custom
# Dockerfile or an opm install step, defeating the reproducibility
# story the public OpenResty pin gives us.
#
# The verifier runs in `access_by_lua_block` before any upstream
# work — same lifecycle position as wallarm's `jwt_validation`
# policy on `request_flow`. (Wallarm ships `jwt_validation`
# natively, but only on from-source `WALLARM_IMAGE` builds; see
# gateways/wallarm/p02-jwt/NOTES.md.)
#
# The `error_page 401` + named location trick mirrors what we do in
# p03/p05/p06 for 429 — same mechanism, different status.

user                 nobody;
worker_processes     auto;
worker_rlimit_nofile 65535;

error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    access_log           off;
    keepalive_timeout    60s;
    keepalive_requests   100000;
    tcp_nodelay          on;
    tcp_nopush           off;
    sendfile             on;

    proxy_request_buffering   off;
    proxy_buffering           off;

    proxy_http_version 1.1;
    proxy_set_header   Connection           "";
    proxy_set_header   Host                 $http_host;
    proxy_set_header   X-Real-IP            $remote_addr;
    proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto    $scheme;

    proxy_connect_timeout   10s;
    proxy_send_timeout      10s;
    proxy_read_timeout      10s;

    upstream backend_pool {
        server backend:8080;
        keepalive         1024;
        keepalive_time    1h;
        keepalive_timeout 60s;
        keepalive_requests 100000;
    }

    default_type  application/octet-stream;

    # Mount our shared Lua library (jwt_hs256, body_rewrite) — docker
    # compose mounts the repo's _shared/lualib/ at this path (see
    # gateways/nginx/docker-compose.yaml). The trailing `;;` appends
    # OpenResty's default search path so bundled modules
    # (resty.sha256, cjson.safe, ...) still resolve.
    lua_package_path "/usr/local/openresty/lualib/bench/?.lua;;";

    # Cache the compiled verifier + secret in worker memory rather
    # than loading it on every request.
    init_by_lua_block {
        bench_jwt = require("jwt_hs256")
        -- Shared secret pinned in docs/POLICIES.md § p02. Public by
        -- design (benchmark-only credential, never used in production).
        bench_secret = "bench-jwt-hs256-secret-2026"
    }

    server {
        listen                 9080 reuseport;
        server_name            bench-nginx;

        location / {
            access_by_lua_block {
                local authz = ngx.var.http_authorization
                local ok, err = bench_jwt.verify(authz, bench_secret)
                if not ok then
                    -- Log at info level (not warn) so the parity
                    -- runner's 401 probes don't spam container logs.
                    ngx.log(ngx.INFO, "jwt reject: ", err or "unknown")
                    return ngx.exit(401)
                end
            }
            proxy_pass http://backend_pool;
        }

        # Stamp a WWW-Authenticate header on every 401 (RFC 6750 §3).
        # Not asserted by the fixture but matches the production
        # shape a real JWT gateway would emit.
        error_page 401 = @unauthorized;
        location @unauthorized {
            internal;
            add_header WWW-Authenticate 'Bearer realm="bench", charset="UTF-8"' always;
            default_type application/json;
            return 401 '{"error":"unauthorized","reason":"jwt_validation_failed"}';
        }
    }
}
