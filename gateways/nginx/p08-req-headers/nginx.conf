# gateways/nginx/p08-req-headers/nginx.conf
#
# Profile: p08-req-headers.
# Canonical spec: docs/POLICIES.md § p07 — add X-Bench-In: 1 to the
# upstream request, drop X-Forwarded-For.
# Canonical fixture: fixtures/p08-req-headers.jsonl
#
# Implementation is pure mainline nginx — `proxy_set_header` is the
# idiomatic directive for both sides of the transform:
#
#   * `proxy_set_header X-Bench-In "1";`            — inject
#   * `proxy_set_header X-Forwarded-For "";`        — drop
#
# The "empty value drops the header" idiom is mainline-nginx-specific:
# when `proxy_set_header` receives an empty string, nginx omits the
# header from the upstream request altogether rather than forwarding
# an empty value. (Compare with `proxy_set_header X-Foo $unset;` in
# some forks — we stay on the vanilla mainline form.)
#
# Other client headers pass through unchanged because we do NOT list
# them in any `proxy_set_header` / `proxy_hide_header` directive; the
# default is verbatim forwarding.
#
# The fixture hits `/headers`, which go-httpbin handles as a
# first-class endpoint that echoes every received header as a JSON
# array. Unlike the wallarm cell we do NOT need to re-route through
# `/anything/headers` — nginx's `proxy_pass http://backend_pool;`
# forwards the path verbatim without any base-path strip/prepend
# surgery.

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    access_log           off;
    keepalive_timeout    60s;
    keepalive_requests   100000;
    tcp_nodelay          on;
    tcp_nopush           off;
    sendfile             on;

    proxy_request_buffering   off;
    proxy_buffering           off;

    proxy_http_version 1.1;

    # -------------------------------------------------------------------------
    # p07 — request-header transforms
    # -------------------------------------------------------------------------
    # Standard connection cleanup (same across every profile).
    proxy_set_header   Connection           "";
    # Host/Proto pass-throughs (same across every profile).
    proxy_set_header   Host                 $http_host;
    proxy_set_header   X-Forwarded-Proto    $scheme;
    # Intentionally do NOT set X-Real-IP here — p07 is about
    # client-supplied header manipulation, and adding a synthetic
    # X-Real-IP would pollute the echo surface the fixture asserts
    # against.

    # p06-specific: inject X-Bench-In, drop X-Forwarded-For.
    # These two lines ARE the profile's behavioural contract.
    proxy_set_header   X-Bench-In           "1";
    proxy_set_header   X-Forwarded-For      "";

    proxy_connect_timeout   10s;
    proxy_send_timeout      10s;
    proxy_read_timeout      10s;

    upstream backend_pool {
        server backend:8080;
        keepalive         1024;
        keepalive_time    1h;
        keepalive_timeout 60s;
        keepalive_requests 100000;
    }

    default_type  application/octet-stream;

    server {
        listen                 9080 reuseport;
        server_name            bench-nginx;

        location / {
            proxy_pass http://backend_pool;
        }
    }
}
