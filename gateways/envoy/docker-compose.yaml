# gateways/envoy/docker-compose.yaml
#
# Single-gateway stack used by `make parity-gateway` for parity attestation.
# Same port contract as every other gateway under `gateways/<gw>/`:
#
#     loadgen (host)  →  envoy :9080  →  backend :8080
#
# Envoy has a read-only admin API (by convention on :9901). We *do*
# publish it because parity-gateway.sh's generic wait loop is happy
# with either port answering and because it is useful for debugging
# live runs (`curl :9901/stats` / `/clusters`). No profile ever
# mutates the configuration through it — every profile ships a full
# static bootstrap file mounted read-only at /etc/envoy/envoy.yaml
# and reloads by container restart.
#
# The policy profile is picked by the GATEWAY_PROFILE env var (default
# `p01-vanilla`). Each profile directory must contain:
#
#   envoy.yaml   - full static bootstrap (listener + clusters + filters)
#   setup.sh     - post-up smoke check (envoy is ready at container start)
#   NOTES.md     - profile-specific notes / deviations
#
# Default image is pinned by digest for reproducibility; refresh with:
#   docker pull envoyproxy/envoy:distroless-v1.32.6 && \
#     docker image inspect envoyproxy/envoy:distroless-v1.32.6 \
#       --format '{{index .RepoDigests 0}}'
#
# The GATEWAY_IMAGE override hook is wired in (per the wallarm/nginx
# pattern) so a future profile that needs a non-distroless image — or
# an unreleased build — can swap it via `gateways/envoy/<profile>/.env`
# without touching this file.

name: gateway-benchmarks-envoy

services:
  backend:
    image: gateway-benchmarks/backend:v2.22.1
    container_name: gwb-envoy-backend
    restart: "no"
    # Backend listens on :8080 inside the container. We do NOT publish
    # it on the host — only the gateway needs to talk to it, over the
    # private `bench-net` bridge. Add `- "8088:8080"` temporarily if
    # you want to probe it from the host.
    networks:
      bench-net:
        aliases: [backend]

  gateway:
    image: ${GATEWAY_IMAGE:-envoyproxy/envoy:distroless-v1.32.6@sha256:569ad5b2503aca24c9f6af48c47449200afdb761bb4d1a021741d6d6692acf56}
    container_name: gwb-envoy
    restart: "no"
    depends_on:
      - backend
    # Distroless envoy entrypoint is `envoy` itself; we pass the
    # bootstrap file and tune log level for a quiet hot path. Component
    # log overrides keep filter-level traces silent while the
    # orchestrator still sees real warnings.
    #
    # `--concurrency 2` pins envoy to exactly two worker threads. That
    # is deliberate for parity: envoy's local_ratelimit filter keeps its
    # token bucket *per worker*, so with the default `--concurrency
    # N_CPU` the canonical limits would scale up by an unpredictable
    # factor. Two workers is the sweet spot between:
    #
    #   * one worker — single-threaded accept() path can not keep up
    #     with the 128-parallel-curl burst probe; ~40 % of the 1200
    #     requests get dropped as connection-refused before the
    #     rate-limit filter sees them;
    #   * N_CPU workers — token buckets multiply unpredictably (one
    #     bucket per worker) and the effective rate drifts with CPU.
    #
    # With two workers the rate-limit profiles divide their token
    # buckets by two (p03: tokens_per_fill=500, p04: tokens_per_fill=5,
    # p05: tokens_per_fill=50) so the *effective* service-wide /
    # per-key rate matches the canonical value from
    # docs/POLICIES.md. This is a documented deviation driven by the
    # filter's per-worker design and is recorded in each profile's
    # NOTES.md.
    command:
      - "-c"
      - "/etc/envoy/envoy.yaml"
      - "--log-level"
      - "warn"
      - "--component-log-level"
      - "upstream:warn,connection:error,http:warn"
      - "--concurrency"
      - "2"
    # Config ingestion notes:
    #   * envoy.yaml arrives via `configs:` (not a bind-mount). Docker
    #     Desktop on Apple Silicon caches bind-mounted host files with
    #     a TTL that sometimes survives `compose down`+`up` cycles
    #     (observed 15–45 s of stale content after edits). Using
    #     `configs:` routes the file through the Docker daemon's
    #     config store which is re-materialised on every `up`, so
    #     the container always reads exactly what is on disk right
    #     now — critical when iterating on a fragile filter
    #     configuration like local_ratelimit.
    #   * The shared Lua library stays a bind-mount because it is a
    #     directory and updates there don't invalidate a critical
    #     protobuf-parsed file.
    configs:
      - source: envoy_yaml
        target: /etc/envoy/envoy.yaml
        mode: 0444
    volumes:
      - ./_shared/lualib:/etc/envoy/lualib:ro
    ports:
      - "9080:9080"  # data plane (parity-gateway target)
      - "9901:9901"  # admin (read-only: /stats, /clusters, /config_dump)
    # Envoy drains gracefully on SIGTERM. A 5 s stop-grace-period keeps
    # `docker compose down` snappy during the parity sweeps.
    stop_grace_period: 5s
    networks:
      bench-net:
        aliases: [gateway]

networks:
  bench-net:
    driver: bridge

configs:
  envoy_yaml:
    file: ./${GATEWAY_PROFILE:-p01-vanilla}/envoy.yaml
