# gateways/wallarm/p06-req-headers/gateway.yaml
#
# Profile p06-req-headers: request-header rewrite
# (`add X-Bench-In: 1`, `remove X-Forwarded-For`).
# Static config is identical to p01-vanilla — every profile-specific
# piece lives in setup.sh (Admin API bootstrap) and NOTES.md.

net:
  http_port: 9080

admin:
  listen_address: "0.0.0.0"
  listen_port: 9081

persistence:
  enabled: false

upstream:
  pool:
    size: 1024
    idle_timeout_ms: 60000
  tcp:
    keepalive_secs: 90
    nodelay: true
    reuse_address: true
