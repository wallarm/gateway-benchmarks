# gateways/envoy/p11-resp-body/envoy.yaml
#
# Profile: p11-resp-body.
# Canonical spec: docs/POLICIES.md § p10 — rewrite the response body
#   * add    $.bench.injected = true
#   * remove $.origin
# Canonical fixture: fixtures/p11-resp-body.jsonl
#
# Envoy implementation: single `envoy.filters.http.lua` filter whose
# `envoy_on_response(response_handle)` reads the full response body,
# rewrites JSON, and writes it back with `setBytes`. Unlike request
# bodies, response bodies are automatically buffered by the Lua
# filter when `response_handle:body()` is called, so we do NOT need
# a Buffer filter on the response side — only the request side
# (which this profile does not touch).
#
# The `body_rewrite.rewrite_response_if_json` helper short-circuits
# on any non-JSON payload (HTML error pages, streamed binary), so
# go-httpbin's `/bytes/1024` or `/status/404` responses pass
# through verbatim.
#
# Content-Length / Transfer-Encoding
# ----------------------------------
# Envoy's `setBytes` on the response buffer recomputes Content-Length
# automatically — no header manipulation required from Lua. Compare
# with the nginx column, which must explicitly clear
# `ngx.header.content_length = nil` in `header_filter_by_lua_block`
# and switch to chunked transfer encoding because OpenResty's
# `ngx.arg[1]/[2]` chunking interface does not patch the header.
# Envoy's abstraction is cleaner here.

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9080
      reuse_port: true
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: HTTP1
                common_http_protocol_options:
                  idle_timeout: 60s
                  # See p01-vanilla/envoy.yaml: max_connection_duration
                  # MUST stay UNSET.
                  max_requests_per_connection: 100000
                stream_idle_timeout: 60s
                request_timeout: 10s
                normalize_path: false
                merge_slashes: false
                server_header_transformation: OVERWRITE
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_vh
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 10s
                http_filters:
                  # ---------------------------------------------------
                  # Lua — response-body rewrite.
                  # ---------------------------------------------------
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          package.path = "/etc/envoy/lualib/?.lua;" ..
                                         (package.path or "")
                          local body = require("body_rewrite")

                          function envoy_on_response(resp)
                              -- Calling body() on the response_handle
                              -- triggers envoy's automatic buffering
                              -- of the upstream response. Returns a
                              -- Buffer object or nil for empty bodies
                              -- (e.g. 204 No Content — not exercised
                              -- by this profile).
                              local buf = resp:body()
                              if not buf or buf:length() == 0 then
                                  return
                              end
                              local raw = buf:getBytes(0, buf:length())
                              local new, err =
                                  body.rewrite_response_if_json(
                                      raw,
                                      {"bench", "injected"}, true,
                                      {"origin"}
                                  )
                              if not new then
                                  resp:logErr("p10 rewrite failed: " ..
                                              tostring(err))
                                  return
                              end
                              -- When upstream was non-JSON
                              -- rewrite_response_if_json returns the
                              -- original bytes, so setBytes(new) is a
                              -- no-op. When JSON, setBytes replaces
                              -- the body and envoy recomputes
                              -- Content-Length on the client-bound
                              -- response.
                              if new ~= raw then
                                  buf:setBytes(new)
                              end
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: backend_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 10s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 60s
            max_requests_per_connection: 100000
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
          keepalive_interval: 10
          keepalive_probes: 3
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 8080
