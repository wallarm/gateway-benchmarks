# gateways/envoy/p08-req-headers/envoy.yaml
#
# Profile: p08-req-headers.
# Canonical spec: docs/POLICIES.md § p07 — add X-Bench-In: 1 to the
#   upstream request, drop X-Forwarded-For.
# Canonical fixture: fixtures/p08-req-headers.jsonl
#
# Native envoy implementation via `request_headers_to_add` /
# `request_headers_to_remove` on the virtual_host. These two fields
# are documented in the v3 route_components proto and run in the
# HCM's header-transform stage, BEFORE the router hands the request
# off to the upstream cluster:
#
#   * virtual_hosts[].request_headers_to_add
#       [{ header: { key, value }, append_action }] — the injection
#       list. Envoy evaluates `append_action: OVERWRITE_IF_EXISTS_OR_ADD`
#       as "set this header, wiping any client-supplied value". The
#       fixture asserts backend_saw_header: X-Bench-In == "1", so
#       OVERWRITE_IF_EXISTS_OR_ADD is the semantically correct knob
#       (compare with APPEND_IF_EXISTS_OR_ADD which would produce
#       a comma-joined duplicate when a client ships their own).
#
#   * virtual_hosts[].request_headers_to_remove
#       [string] — the drop list. Matches are case-insensitive per
#       RFC 7230 §3.2. Placing X-Forwarded-For here removes the
#       client-supplied header from the upstream-bound request; the
#       backend-side fixture then asserts the header is absent.
#
# Why virtual_host, not per-route?
# -------------------------------
# The fixture hits `/headers` only, but in real deployments the
# transform applies to every route served by the listener. Putting
# these fields on the virtual_host covers all present and future
# routes in one place, which also matches nginx's `http {} / server
# {}`-level `proxy_set_header` idiom (gateways/nginx/p08-req-headers/
# nginx.conf). The alternative (route-level `request_headers_to_add`)
# would be correct for our current single-route config but loses the
# "service-wide transform" intent.
#
# No envoy-stamped trace headers
# ------------------------------
# envoy stamps its own `x-envoy-*` headers on every upstream request
# (e.g. x-envoy-expected-rq-timeout-ms, x-envoy-original-path). The
# fixture does not assert on those, and they do not overlap with
# X-Bench-In / X-Forwarded-For, so we leave the stock behaviour
# untouched. If a future probe cares about a clean header surface,
# `suppress_envoy_headers: true` on the router filter can silence
# all of them at once.
#
# Everything else (listener, cluster, uniform settings) is identical
# to p01-vanilla so the only axis the fixture can measure is the
# header transform itself.

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9080
      reuse_port: true
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: HTTP1
                common_http_protocol_options:
                  idle_timeout: 60s
                  # See p01-vanilla/envoy.yaml: max_connection_duration
                  # MUST stay UNSET — `0s` would slam every connection
                  # at t=0.
                  max_requests_per_connection: 100000
                stream_idle_timeout: 60s
                request_timeout: 10s
                normalize_path: false
                merge_slashes: false
                server_header_transformation: OVERWRITE
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_vh
                      domains: ["*"]
                      # -----------------------------------------------
                      # p07 — request-header transforms
                      # -----------------------------------------------
                      # Inject the bench marker. OVERWRITE_IF_EXISTS_OR_ADD
                      # guarantees the backend sees `X-Bench-In: 1` even
                      # if a client ships their own value.
                      request_headers_to_add:
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: x-bench-in
                            value: "1"
                      # Drop the client-supplied X-Forwarded-For. Matching
                      # is case-insensitive — envoy normalizes every
                      # incoming header to lowercase at the HCM layer
                      # (HTTP/1.1 semantics), so this entry catches
                      # `X-Forwarded-For`, `x-forwarded-for`, `X-FORWARDED-FOR`.
                      request_headers_to_remove:
                        - x-forwarded-for
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 10s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: backend_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 10s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 60s
            max_requests_per_connection: 100000
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
          keepalive_interval: 10
          keepalive_probes: 3
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 8080
