# gateways/wallarm/p03-jwks-rs256-basic/gateway.yaml
#
# Policy profile `p03-jwks-rs256-basic` (12-profile matrix): RS256 JWT validation
# matrix. Static listener / pool / admin settings are byte-for-byte
# identical to gateways/wallarm/p02-jwt/gateway.yaml so the ONLY thing
# that changes between a core p02-jwt run and this p03 run is
# the policy binding emitted by `setup.sh` (HS256 secret vs. inline
# RS256+JWKS).

net:
  http_port: 9080

admin:
  listen_address: "0.0.0.0"
  listen_port: 9081

persistence:
  enabled: false

upstream:
  pool:
    size: 1024
    idle_timeout_ms: 60000
  tcp:
    keepalive_secs: 90
    nodelay: true
    reuse_address: true
