# gateways/nginx/p05-rl-dynamic-high/nginx.conf
#
# Profile: p05-rl-dynamic-high (per-client-IP rate limit, high cardinality).
# Canonical spec: docs/POLICIES.md § p05
# Canonical fixture: fixtures/p05-rl-dynamic-high.jsonl
#
# Limit:        100 req/s per client IP
# Key source:   X-Real-IP header (nginx variable $http_x_real_ip)
# IP pool:      50 000 distinct IPs per POLICIES.md (fixture exercises
#               only a couple, but the zone is sized for the full pool
#               so the cell mirrors the "high cardinality" axis of the
#               benchmark — this is what Phase 4's k6 profile will
#               actually flood).
# Over-limit:   HTTP 429 with Retry-After: 1
#
# Zone sizing: nginx reserves roughly 128 bytes per key; 50 000 keys
# therefore need ~6.5 MB. We round up to 10 MB to leave room for
# fragmentation and for the LRU eviction overhead (the module drops
# the oldest key when the zone fills, so ~30% slack avoids thrashing
# under the fixture's key-rotation pattern). This is the single
# biggest configured-resource difference between p04 and p05 — the
# "✓†" footnote in `docs/POLICIES.md § Feature availability` for
# nginx / p05.
#
# Burst sizing: `burst=20 nodelay` is tuned against the two burst
# probes in the fixture:
#   * 10 IPs × 20 rps / 1 s — each IP sends 20 requests well below
#     the 100 rps limit, so all 200 must come back 2xx. With
#     `burst=20`, every IP can absorb all 20 requests as soon as
#     they arrive (1 rate-free token + 20 burst slots = 21 > 20).
#   * 1 IP × 500 rps / 1 s — 500 requests ASAP against rate=100 +
#     burst=20. Expected shape: ~21 × 2xx + ~479 × 429 (fixture
#     asserts `status_429_min=300 ± 40`, minimum 260 — comfortable
#     headroom).

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    access_log           off;
    keepalive_timeout    60s;
    keepalive_requests   100000;
    tcp_nodelay          on;
    tcp_nopush           off;
    sendfile             on;

    proxy_request_buffering   off;
    proxy_buffering           off;

    proxy_http_version 1.1;
    proxy_set_header   Connection           "";
    proxy_set_header   Host                 $http_host;
    proxy_set_header   X-Real-IP            $remote_addr;
    proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto    $scheme;

    proxy_connect_timeout   10s;
    proxy_send_timeout      10s;
    proxy_read_timeout      10s;

    upstream backend_pool {
        server backend:8080;
        keepalive         1024;
        keepalive_time    1h;
        keepalive_timeout 60s;
        keepalive_requests 100000;
    }

    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # p05 — per-IP rate limit (100 rps per X-Real-IP, 50 000-IP pool)
    # -------------------------------------------------------------------------
    limit_req_zone        $http_x_real_ip zone=bench_p05:10m rate=100r/s;
    limit_req_status      429;

    server {
        listen                 9080 reuseport;
        server_name            bench-nginx;

        location / {
            limit_req zone=bench_p05 burst=20 nodelay;
            error_page 429 @retry_after;

            proxy_pass http://backend_pool;
        }

        location @retry_after {
            internal;
            add_header Retry-After "1" always;
            default_type application/json;
            return 429 '{"error":"rate_limit_exceeded","limit":"100r/s","scope":"per-ip"}';
        }
    }
}
