# gateways/nginx/p01-vanilla/nginx.conf
#
# Profile: p01-vanilla (catch-all proxy, no policy).
# Expected fixture behaviour:
#   GET  /status/200  → 200                            (status passthrough)
#   GET  /anything    → 200 + body echoes .method      (json echo)
#   POST /anything    → 200 + body echoes .json        (json echo)
#   GET  /bytes/1024  → 200 + Content-Length present   (binary passthrough)
#
# The config is intentionally minimal so nginx's native behaviour is
# what actually gets measured. Every uniform setting called out by
# docs/GATEWAYS.md §Uniform settings is expressed explicitly below so
# we don't drift on the happy path.

# Run nginx as a non-privileged user (already present in the -alpine
# image as `nginx`); one worker per CPU core per docs/GATEWAYS.md §10.
user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

# Silence the startup error log as much as possible so the parity
# runner's `docker compose logs` doesn't drown real failures. Errors
# still go to stderr, which Docker captures.
error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;
    multi_accept        on;
    use                 epoll;
}

http {
    # -------------------------------------------------------------------------
    # Uniform settings (docs/GATEWAYS.md §Uniform settings)
    # -------------------------------------------------------------------------

    # Access logging OFF on the hot path — log I/O would bias latency.
    access_log  off;

    # Downstream keep-alive ON. 60 s idle matches the upstream pool.
    keepalive_timeout   60s;
    keepalive_requests  100000;

    # TCP: nodelay ON, keepalive ON at the socket level. `reuseport` lets
    # each worker own its own listening socket and avoids the thundering
    # herd on accept().
    tcp_nodelay   on;
    tcp_nopush    off;
    sendfile      on;

    # Request / response body buffering OFF (or smallest feasible window).
    # `proxy_request_buffering off;` hands the client's body to the
    # upstream as soon as bytes arrive. `proxy_buffering off;` does the
    # same on the way back. See http://nginx.org/en/docs/http/ngx_http_proxy_module.html
    proxy_request_buffering   off;
    proxy_buffering           off;

    # HTTP/1.1 upstream (no HTTP/2 upstream in nginx core; explicit for clarity).
    proxy_http_version 1.1;
    proxy_set_header   Connection           "";
    proxy_set_header   Host                 $http_host;
    proxy_set_header   X-Real-IP            $remote_addr;
    proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto    $scheme;

    # Request timeout — 10 s per docs/GATEWAYS.md §Uniform settings.
    proxy_connect_timeout   10s;
    proxy_send_timeout      10s;
    proxy_read_timeout      10s;

    # Upstream connection pool — 1024 idle, keep-alive ∞
    # (nginx's `keepalive` directive counts idle conns per worker).
    upstream backend_pool {
        server backend:8080;
        keepalive         1024;
        keepalive_time    1h;
        keepalive_timeout 60s;
        keepalive_requests 100000;
    }

    # Types map — not strictly needed for the fixture but a missing
    # default here causes nginx to fall back to `text/plain` which
    # would skew content-length checks.
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Listener — HTTP/1.1 only (no `http2`, no `http3`)
    # -------------------------------------------------------------------------
    server {
        # `listen 9080` + no `http2` keyword ⇒ HTTP/1.1 only on the
        # downstream side, which is what the parity attestation probes.
        listen                 9080 reuseport;
        server_name            _;

        # Disable the default "405 Not Allowed" on /nginx_status-style
        # probes; the fixture never touches these paths but curl's
        # health wait loop in parity-gateway.sh can hit `/` on a cold
        # start and we want a consistent 502 / 200, not a 405.
        error_page 404 =404 @notfound;
        location @notfound {
            return 404;
        }

        # Single catch-all `proxy_pass` — the cleanest way to express a
        # vanilla gateway in nginx. No URL rewriting, no path
        # manipulation. The trailing slash is deliberately *absent* from
        # `proxy_pass http://backend_pool;` so that nginx preserves the
        # client URI unchanged (§ "If proxy_pass is specified without
        # a URI, the request URI is passed to the server in the same
        # form as sent by a client").
        location / {
            proxy_pass http://backend_pool;
        }
    }
}
