# gateways/envoy/p03-jwks-rs256-basic/envoy.yaml
#
# Policy profile p03-jwks-rs256-basic (12-profile matrix): RS256 JWT validation
# matrix; lives parallel to p02-jwt). Canonical description:
# docs/POLICIES.md § p03-jwks-rs256-basic.
# Canonical fixture: fixtures/p03-jwks-rs256-basic.jsonl.
#
# Envoy realises "RS256 + static inline JWKS, validate `kid` before
# verifying signature" via the NATIVE `envoy.filters.http.jwt_authn`
# filter at the HCM level. No Lua, no sidecar, no plugin registry —
# this is one of the handful of gateways where p03-jwks-rs256-basic is
# a pure static-config exercise.
#
# ┌─────────────┐  Authorization: Bearer <jwt>   ┌──────────────────────┐
# │ downstream  │ ─────────────────────────────▶ │ HCM filter chain     │
# │   :9080     │                                │   1. jwt_authn       │ ◀── inline JWKS
# │             │ ◀─────── 401 / 200 ────────────│   2. router          │
# └─────────────┘                                └──────────────────────┘
#                                                        │
#                                                        ▼
#                                                  backend_cluster
#                                                  (STRICT_DNS :8080)
#
# Native primitive contract, verified against
# https://www.envoyproxy.io/docs/envoy/v1.32.6/api-v3/extensions/filters/http/jwt_authn/v3/config.proto:
#
#   * `providers[].issuer`
#       Optional. If set, envoy enforces `iss == issuer`. We set it to
#       the canonical `gateway-benchmarks` value from
#       `gateways/_reference/jwt/payload-template.json` so the first
#       iteration of this scenario also asserts issuer parity for free.
#
#   * `providers[].local_jwks.inline_string`
#       JWKS as a literal string. We embed the compact form of
#       `gateways/_reference/jwks-rs256/jwks.json` here. A drift guard
#       in `setup.sh` diffs the embedded JSON against the reference
#       file at every run so a future `_reference` rotation cannot
#       silently leave this profile stuck on a stale key.
#
#   * `providers[].from_headers`
#       Deliberately UNSET. Envoy's default extraction is
#       `Authorization: Bearer <token>`, which matches every other
#       gateway column and the canonical payload in POLICIES.md.
#
#   * `rules[].match.prefix: "/"`
#     `rules[].requires.provider_name: bench_rs256_provider`
#       Every downstream request must carry a valid JWT whose `kid`
#       resolves in the inline JWKS. The `no Authorization` probe
#       therefore hits `Jwt is missing` -> 401 before reaching the
#       router, and the `unknown-kid` probe hits `Jwks kid is not
#       found` -> 401. These are envoy's stock error messages; we
#       leave `strip_failure_response: false` (default) so operators
#       eyeballing the response body see the diagnostic hint.
#
# Everything else (listener, cluster, uniform settings) is identical
# to p01-vanilla so the only axis the parity fixture can measure is
# the JWT/JWKS primitive itself.

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9080
      reuse_port: true
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: HTTP1
                common_http_protocol_options:
                  idle_timeout: 60s
                  # See p01-vanilla/envoy.yaml: leaving
                  # max_connection_duration UNSET (rather than `0s`) is
                  # the "no maximum" setting; `0s` closes every
                  # connection at t=0 and every request fails
                  # mid-response.
                  max_requests_per_connection: 100000
                stream_idle_timeout: 60s
                request_timeout: 10s
                normalize_path: false
                merge_slashes: false
                server_header_transformation: OVERWRITE
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_vh
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 10s
                http_filters:
                  # -------------------------------------------------------
                  # p03-jwks-rs256-basic — native JWT+JWKS verification
                  # -------------------------------------------------------
                  # Filter runs BEFORE the router so rejection happens
                  # inside envoy (no spurious upstream connection on
                  # 401). One provider, one rule — the minimum shape
                  # that encodes the canonical three probes.
                  - name: envoy.filters.http.jwt_authn
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers:
                        bench_rs256_provider:
                          # Matches `iss` in gateways/_reference/jwt/payload-template.json.
                          # Optional per the proto, but setting it turns
                          # iss-mismatch into a 401 for free and prevents
                          # a drift where a forged token with a
                          # different `iss` slips through.
                          issuer: gateway-benchmarks
                          # `audiences` intentionally omitted — the
                          # canonical payload carries no `aud` claim
                          # (see POLICIES.md § p03-jwks-rs256-basic
                          # and the inline JWKS description in NOTES.md).
                          # Keep signed JWTs in the request as they
                          # travel to the backend so loadgen can
                          # introspect them if needed. The smoke tests
                          # and fixture probes only inspect response
                          # status codes, so this does not affect the
                          # verdict either way — it is just the less
                          # surprising default for an observability-
                          # friendly bench.
                          forward: true
                          local_jwks:
                            # DRIFT GUARD: this inline JSON MUST match
                            # the compact form of
                            # gateways/_reference/jwks-rs256/jwks.json.
                            # setup.sh diffs them on every run via
                            # `jq -S -c .` on both sides and aborts
                            # with FEATURE-MISSING if they diverge.
                            inline_string: |
                              {"keys":[{"kty":"RSA","use":"sig","alg":"RS256","kid":"bench-rs256-2026","n":"6OGfbNN190m8F_xa8sZ4UjEk7ONG6OvTJm376pCmO0FOgCleynymCIfbI4EH3ObxewnlLOVcVwZ8uvcTIc3OSAZVD2SjbOY0dc1s-eQpjrjMQOK2UHSs0fcFjHvlof6c_mfiB0XBk1OYWWWYV5AqfeoK16AzCGKj7DEw6BGOmIf13pWKFwkuikgXEZpyAsoeP-Dz67ga1gYwcbtB84KzmDSE88AduzDtHPOJ9xVA273FoLBU0MItp60IA9WpzyQyr7AIYOeigF8rFocAH00YChyG2-XWNom-ddcSD_0la9IjbJQWehCFVETI6Lb69-jN-N1iGv-AkPUpjv8Xv3y1-Q","e":"AQAB"}]}
                      rules:
                        - match:
                            prefix: "/"
                          requires:
                            provider_name: bench_rs256_provider
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: backend_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 10s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 60s
            max_requests_per_connection: 100000
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
          keepalive_interval: 10
          keepalive_probes: 3
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 8080
