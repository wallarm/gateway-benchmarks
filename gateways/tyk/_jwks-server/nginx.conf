# gateways/tyk/_jwks-server/nginx.conf
#
# Tiny static server used only by the tyk stack. It exposes the
# canonical JWKS from `gateways/_reference/jwks-rs256/jwks.json` at
# the well-known path
#
#     http://jwks-server/.well-known/jwks.json
#
# Tyk's `jwt_source` field treats its value as a URL when it matches
# `^(http|https):` and otherwise as a base64-encoded PEM — so the
# only way to get true JWKS-with-kid-lookup is to serve a real
# HTTP endpoint. This file is that endpoint.
#
# Not a fan of the extra container? See gateways/tyk/README.md for
# the alternatives we rejected (base64 PEM has no kid lookup; the
# base64 path decodes to either a raw secret OR an inner URL, the
# former collapsing the 3-probe fixture into 2 probes).
#
# Everything else (access log format, listen port, error handling)
# is kept stock so this server resembles a minimal production JWKS
# origin.

server {
    listen      80 default_server;
    server_name _;

    # The bind-mount lands the canonical JWKS at this exact absolute
    # path (see docker-compose.yaml, service `jwks-server`). Pinning
    # `root` explicitly — rather than relying on nginx's compiled-in
    # default, which varies between mainline and alpine flavors —
    # keeps the scenario reproducible even if the base image is
    # swapped.
    root        /usr/share/nginx/html;

    # The JWKS file is mounted by docker-compose. Serve it with a
    # short Cache-Control so a future `docker compose restart
    # jwks-server` after a key rotation takes effect inside Tyk
    # quickly (Tyk's own JWKCache has a 240 s TTL — see mw_jwt.go
    # `legacyGetSecretFromURL`, which is what Classic APIs use).
    location = /.well-known/jwks.json {
        default_type      application/json;
        add_header        Cache-Control "public, max-age=60" always;
        add_header        X-JWKS-Source "gateway-benchmarks/_reference/jwks-rs256/jwks.json" always;
    }

    # Everything else is a hard 404 — we do NOT want this sidecar to
    # act as a generic static file server. Keep the attack surface
    # to exactly one path.
    location / {
        return 404;
    }
}
